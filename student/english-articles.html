<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>英文阅读</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); }
    .back-btn { color: #fff; text-decoration: none; font-size: 15px; padding: 4px 8px; border-radius: 8px; background: rgba(255,255,255,20%); }
    .page-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #4F46E5; color: #fff; }
    .article-list { padding: 12px 16px; }
    .article-card {
      background: #fff; border-radius: 16px; padding: 18px;
      margin-bottom: 12px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.1s;
    }
    .article-card:active { transform: scale(0.98); }
    .article-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .article-preview { font-size: 13px; color: var(--sub); line-height: 1.5;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .article-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .article-tag { font-size: 11px; background: #EEF2FF; color: #4F46E5; padding: 3px 10px; border-radius: 8px; font-weight: 600; }
    .article-arrow { font-size: 20px; color: #ccc; }
    .empty-state { text-align: center; padding: 80px 0; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    /* Article reader */
    .reader-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #4F46E5; color: #fff; }
    .reader-body { padding: 16px; }
    .reader-title { font-size: 22px; font-weight: 800; margin-bottom: 16px; }
    .reader-image { width: 100%; border-radius: 12px; margin-bottom: 16px; }
    .reader-content { font-size: 15px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
    /* Nav bar */
    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid var(--border);
      display: flex; padding: 8px 0; padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .nav-item { flex: 1; text-align: center; font-size: 11px; color: var(--sub); text-decoration: none; }
    .nav-item .nav-icon { font-size: 22px; display: block; }
    .nav-item.active { color: #4F46E5; }
    body { padding-bottom: 72px; }
  </style>
</head>
<body>

<div id="list-view">
  <div class="page-header">
    <a href="index.html" class="back-btn">← 返回</a>
    <span style="font-weight:700">英文阅读</span>
  </div>
  <div class="article-list" id="article-list">
    <div style="text-align:center;padding:40px;color:var(--sub)">加载中...</div>
  </div>
</div>

<div id="reader-view" style="display:none">
  <div class="reader-header">
    <a href="#" class="back-btn" onclick="closeReader()">← 返回</a>
    <span style="font-weight:700" id="reader-title-nav">阅读</span>
  </div>
  <div class="reader-body">
    <img class="reader-image" id="reader-image" src="" style="display:none">
    <div class="reader-content" id="reader-content"></div>
  </div>
</div>

<nav class="nav-bar">
  <a href="index.html" class="nav-item active">
    <span class="nav-icon">🏠</span>首页
  </a>
  <a href="today.html" class="nav-item">
    <span class="nav-icon">📅</span>今日
  </a>
  <a href="profile.html" class="nav-item">
    <span class="nav-icon">👤</span>我的
  </a>
</nav>

<script>
const API = 'http://' + location.hostname + ':8080/api';

async function loadArticles() {
  const res = await fetch(API + '/english/articles?week_date=2026-05-11');
  const data = await res.json();
  const articles = data.articles || [];

  if (articles.length === 0) {
    document.getElementById('article-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📄</div>
        <div class="empty-title">暂无文章</div>
        <div class="empty-sub">家长配置后即可阅读</div>
      </div>`;
    return;
  }

  document.getElementById('article-list').innerHTML = articles.map(a => {
    const imgUrls = a.image_urls ? JSON.parse(a.image_urls) : [];
    const preview = (a.content || '').slice(0, 60);
    return `
      <div class="article-card" onclick="openArticle(${a.id}, '${encodeURIComponent(a.title)}')">
        <div class="article-title">${a.title}</div>
        <div class="article-preview">${preview}</div>
        <div class="article-footer">
          <span class="article-tag">Week ${a.week_date || ''}</span>
          <span class="article-arrow">›</span>
        </div>
      </div>`;
  }).join('');
}

async function openArticle(id, title) {
  const res = await fetch(API + '/english/articles?week_date=2026-05-11');
  const data = await res.json();
  const article = (data.articles || []).find(a => a.id == id);
  if (!article) return;

  const imgUrls = article.image_urls ? JSON.parse(article.image_urls) : [];

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('reader-view').style.display = 'block';
  document.getElementById('reader-title-nav').textContent = article.title;
  document.getElementById('reader-content').textContent = article.content || '';

  if (imgUrls.length > 0) {
    document.getElementById('reader-image').src = '/uploads/english/' + imgUrls[0];
    document.getElementById('reader-image').style.display = 'block';
  }
}

function closeReader() {
  event.preventDefault();
  document.getElementById('reader-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
}

loadArticles();
</script>
</body>
</html>
