<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习配置 - 家长端</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --primary: #004BFE;
      --success: #52C41A;
      --warning: #FF9500;
      --error: #FF4D4F;
      --bg: #F5F6FA;
      --card: #fff;
      --border: #E8E9F0;
      --text: #1A1A1A;
      --sub: #8E8E93;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1C1C1E;
        --card: #2C2C2E;
        --border: #3A3A3C;
        --text: #F5F5F7;
        --sub: #8E8E93;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding-bottom: 20px; }
    .header { display: flex; align-items: center; padding: 16px; gap: 12px; }
    .back { color: var(--primary); font-size: 15px; text-decoration: none; font-weight: 500; }
    .header h1 { flex: 1; text-align: center; font-size: 17px; margin-right: 60px; }
    .section { padding: 0 16px 16px; }
    .section-title { font-size: 12px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; margin-top: 20px; }
    .card { background: var(--card); border-radius: 14px; padding: 16px; border: 1px solid var(--border); margin-bottom: 12px; }
    .card:active { opacity: 0.9; }
    .subject-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .subject-icon { font-size: 28px; }
    .subject-name { font-size: 16px; font-weight: 700; }
    .subject-badge { margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .badge-active { background: #E8F5E9; color: #52C41A; }
    .badge-draft { background: #FFF3E0; color: #FF9500; }
    .config-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .tag { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .tag.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tag.partial { background: #FFF3E0; color: #FF9500; border-color: #FFD591; }
    .btn { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:active { background: #003ACC; }
    .btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; z-index: 100; display: none; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px; }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }
    .modal-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .modal-tab { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
    .modal-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .unit-group { margin-bottom: 14px; }
    .unit-group-title { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 8px; }
    .unit-items { display: flex; flex-wrap: wrap; gap: 6px; }
    .unit-item { padding: 5px 12px; border-radius: 8px; font-size: 13px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; transition: all 0.15s; }
    .unit-item.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
    .unit-item:active { transform: scale(0.96); }
    .modal-footer { padding: 12px 0; display: flex; gap: 10px; }
    .modal-footer .btn { flex: 1; }
    .empty-hint { text-align: center; color: var(--sub); font-size: 13px; padding: 20px 0; }
    .history-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-date { font-size: 12px; color: var(--sub); margin-bottom: 4px; }
    .history-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .history-tag { padding: 2px 8px; border-radius: 12px; font-size: 11px; background: var(--bg); color: var(--sub); }
    .toggle-btn { color: var(--primary); font-size: 13px; cursor: pointer; padding: 4px 0; }
    .info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
    .info-label { color: var(--sub); }
    .loading { text-align: center; color: var(--sub); padding: 40px; font-size: 14px; }
    .success-msg { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #52C41A; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 200; animation: fadeInOut 2s forwards; }
    @keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 20%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }
  </style>
</head>
<body>

<div class="header">
  <a class="back" href="index.html">← 返回</a>
  <h1>学习配置</h1>
</div>

<div id="app">
  <div class="loading">加载中...</div>
</div>

<!-- 新增配置弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">新增配置</div>
    <div class="modal-tabs" id="modal-tabs"></div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modal-save" onclick="saveConfig()">保存生效</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
let currentSubject = 'chinese';
let availableConfig = { chinese: [], english: [] };
let selectedItems = { chinese: [], english: {} }; // english: { spelling: [], irregular: [], pep: [], reading: [] }
let historyBatches = { chinese: [], english: [] };

// Load on startup
document.addEventListener('DOMContentLoaded', async () => {
  await Promise.all([loadConfig(), loadOptions()]);
  render();
});

async function loadConfig() {
  // Load current active + history from study_batch
  try {
    const r = await fetch(`${API}/parent/batch/list`);
    const data = await r.json();
    historyBatches = { chinese: [], english: [] };
    for (const b of (data.batches || [])) {
      if (b.subject === 'chinese') historyBatches.chinese.push(b);
      else historyBatches.english.push(b);
    }
  } catch(e) {
    console.error(e);
  }
}

async function loadOptions() {
  // Load available config options
  try {
    const r = await fetch(`${API}/parent/batch/options`);
    const data = await r.json();
    availableConfig = {
      chinese: data.chinese || [],
      english: data.english || []
    };
  } catch(e) {
    // Fallback: build from basic API
    availableConfig = { chinese: [], english: [] };
  }
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="section">
      <div class="section-title">学科配置</div>

      <!-- 语文 -->
      <div class="card" onclick="openModal('chinese')">
        <div class="subject-header">
          <span class="subject-icon">📖</span>
          <span class="subject-name">语文</span>
          ${historyBatches.chinese.length > 0
            ? '<span class="subject-badge badge-active">已配置</span>'
            : '<span class="subject-badge badge-draft">未配置</span>'}
        </div>
        <div id="chinese-preview" class="config-tags"></div>
        <div style="font-size:12px;color:var(--primary);margin-top:8px">点击修改配置 →</div>
      </div>

      <!-- 英语 -->
      <div class="card" onclick="openModal('english')">
        <div class="subject-header">
          <span class="subject-icon">🔤</span>
          <span class="subject-name">英语</span>
          ${historyBatches.english.length > 0
            ? '<span class="subject-badge badge-active">已配置</span>'
            : '<span class="subject-badge badge-draft">未配置</span>'}
        </div>
        <div id="english-preview" class="config-tags"></div>
        <div style="font-size:12px;color:var(--primary);margin-top:8px">点击修改配置 →</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">历史配置</div>
      <div class="card">
        <div style="font-size:13px;color:var(--sub);margin-bottom:10px">仅供查看，不可编辑</div>
        <div id="history-list"></div>
      </div>
    </div>
  `;

  renderPreview();
  renderHistory();
}

function renderPreview() {
  // Chinese preview
  const cp = document.getElementById('chinese-preview');
  const cActive = historyBatches.chinese.find(b => b.is_active);
  if (cActive) {
    const items = JSON.parse(cActive.items_json || '[]');
    cp.innerHTML = items.map(i => `<span class="tag selected">${i.label || i.item_id}</span>`).join('');
  } else {
    cp.innerHTML = '<span style="color:var(--sub);font-size:13px">暂未配置</span>';
  }

  // English preview
  const ep = document.getElementById('english-preview');
  const eActive = historyBatches.english.find(b => b.is_active);
  if (eActive) {
    const items = JSON.parse(eActive.items_json || '[]');
    ep.innerHTML = items.map(i => `<span class="tag selected">${i.label || i.item_id}</span>`).join('');
  } else {
    ep.innerHTML = '<span style="color:var(--sub);font-size:13px">暂未配置</span>';
  }
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const all = [
    ...historyBatches.chinese.map(b => ({ ...b, subject_label: '📖语文' })),
    ...historyBatches.english.map(b => ({ ...b, subject_label: '🔤英语' }))
  ].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  if (all.length === 0) {
    el.innerHTML = '<div class="empty-hint">暂无历史配置</div>';
    return;
  }

  el.innerHTML = all.map(b => {
    const items = JSON.parse(b.items_json || '[]');
    const date = new Date(b.created_at).toLocaleDateString('zh-CN');
    return `
      <div class="history-item">
        <div class="history-date">${b.subject_label} · ${date} ${b.is_active ? '<span style="color:#52C41A">· 生效中</span>' : ''}</div>
        <div class="history-tags">
          ${items.map(i => `<span class="history-tag">${i.label || i.item_id}</span>`).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// ─── Modal ───────────────────────────────────────────────
let modalSubject = 'chinese';

function openModal(subject) {
  modalSubject = subject;
  document.getElementById('modal-title').textContent = subject === 'chinese' ? '语文配置' : '英语配置';
  document.getElementById('modal-tabs').innerHTML = `
    <button class="modal-tab active" onclick="switchModalSubject('chinese')">📖 语文</button>
    <button class="modal-tab" onclick="switchModalSubject('english')">🔤 英语</button>
  `;
  // Highlight current
  document.querySelectorAll('.modal-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.includes(subject === 'chinese' ? '语文' : '英语'));
  });

  // Init selected
  const active = historyBatches[subject]?.find(b => b.is_active);
  if (active) {
    const items = JSON.parse(active.items_json || '[]');
    if (subject === 'chinese') {
      selectedItems.chinese = items.map(i => i.item_id);
    } else {
      selectedItems.english = {};
      items.forEach(i => {
        if (!selectedItems.english[i.item_type]) selectedItems.english[i.item_type] = [];
        selectedItems.english[i.item_type].push(i.item_id);
      });
    }
  } else {
    if (subject === 'chinese') selectedItems.chinese = [];
    else selectedItems.english = {};
  }

  renderModalBody();
  document.getElementById('modal').classList.add('show');
}

function switchModalSubject(s) {
  modalSubject = s;
  document.querySelectorAll('.modal-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.includes(s === 'chinese' ? '语文' : '英语'));
  });
  renderModalBody();
}

function renderModalBody() {
  const body = document.getElementById('modal-body');
  if (modalSubject === 'chinese') {
    renderChineseOptions(body);
  } else {
    renderEnglishOptions(body);
  }
}

function renderChineseOptions(container) {
  const units = availableConfig.chinese;
  if (!units || units.length === 0) {
    container.innerHTML = '<div class="loading">加载选项...</div>';
    fetchOptionsChiness();
    return;
  }

  // Group by type
  const groups = {};
  units.forEach(u => {
    if (!groups[u.item_type]) groups[u.item_type] = [];
    groups[u.item_type].push(u);
  });

  const typeLabels = { 'unit': '阅读/园地', 'char': '识字', 'recite': '背诵' };
  let html = '';
  for (const [type, items] of Object.entries(groups)) {
    html += `
      <div class="unit-group">
        <div class="unit-group-title">${typeLabels[type] || type}</div>
        <div class="unit-items">
          ${items.map(i => `
            <div class="unit-item ${selectedItems.chinese.includes(i.item_id) ? 'selected' : ''}"
                 onclick="toggleChinese('${i.item_id}', this)">
              ${i.label}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  container.innerHTML = html || '<div class="empty-hint">暂无可选单元</div>';
}

async function fetchOptionsChiness() {
  try {
    const r = await fetch(`${API}/parent/batch/options`);
    const data = await r.json();
    availableConfig.chinese = data.chinese || [];
    renderModalBody();
  } catch(e) {}
}

function toggleChinese(itemId, el) {
  el.classList.toggle('selected');
  const idx = selectedItems.chinese.indexOf(itemId);
  if (idx >= 0) selectedItems.chinese.splice(idx, 1);
  else selectedItems.chinese.push(itemId);
}

function renderEnglishOptions(container) {
  const opts = availableConfig.english;
  if (!opts || Object.keys(opts).length === 0) {
    container.innerHTML = '<div class="loading">加载选项...</div>';
    fetchOptionsEnglish();
    return;
  }

  const types = [
    { key: 'spelling', label: 'Spelling（拼写）', color: '#004BFE' },
    { key: 'irregular', label: 'Irregular Verbs（不规则动词）', color: '#E65100' },
    { key: 'pep', label: 'PEP 课文词（五年级）', color: '#006644' },
    { key: 'reading', label: '阅读理解', color: '#6A1B9A' }
  ];

  let html = '';
  for (const t of types) {
    const items = opts[t.key] || [];
    if (items.length === 0) continue;
    html += `
      <div class="unit-group">
        <div class="unit-group-title" style="color:${t.color}">${t.label}</div>
        <div class="unit-items">
          ${items.map(i => `
            <div class="unit-item ${(selectedItems.english[t.key] || []).includes(i.item_id) ? 'selected' : ''}"
                 onclick="toggleEnglish('${t.key}', '${i.item_id}', this)">
              ${i.label}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  container.innerHTML = html || '<div class="empty-hint">暂无可选内容</div>';
}

async function fetchOptionsEnglish() {
  try {
    const r = await fetch(`${API}/parent/batch/options`);
    const data = await r.json();
    availableConfig.english = data.english || {};
    renderModalBody();
  } catch(e) {}
}

function toggleEnglish(type, itemId, el) {
  el.classList.toggle('selected');
  if (!selectedItems.english[type]) selectedItems.english[type] = [];
  const idx = selectedItems.english[type].indexOf(itemId);
  if (idx >= 0) selectedItems.english[type].splice(idx, 1);
  else selectedItems.english[type].push(itemId);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

async function saveConfig() {
  let items = [];
  if (modalSubject === 'chinese') {
    items = selectedItems.chinese.map(id => ({ item_type: 'unit', item_id: id, label: id }));
  } else {
    for (const [type, ids] of Object.entries(selectedItems.english)) {
      ids.forEach(id => items.push({ item_type: type, item_id: id, label: id }));
    }
  }

  if (items.length === 0) {
    showMsg('请至少选择一项');
    return;
  }

  try {
    const r = await fetch(`${API}/parent/batch/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject: modalSubject, items })
    });
    const data = await r.json();
    if (data.error) { showMsg(data.error); return; }
    closeModal();
    await loadConfig();
    render();
    showMsg('配置已保存');
  } catch(e) {
    showMsg('保存失败: ' + e.message);
  }
}

function showMsg(text) {
  const el = document.createElement('div');
  el.className = 'success-msg';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}
</script>
</body>
</html>
