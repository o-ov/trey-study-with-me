<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>错题本</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-header">
  <button class="back-btn" onclick="history.back()">←</button>
  <span>📕 错题本</span>
</div>

<div id="summary" class="card" style="margin-bottom:8px">
  <div style="display:flex;justify-content:space-around;text-align:center">
    <div>
      <div id="total" style="font-size:24px;font-weight:700">0</div>
      <div style="font-size:12px;color:var(--sub)">总错字</div>
    </div>
    <div>
      <div id="unreviewed" style="font-size:24px;font-weight:700;color:var(--warning)">0</div>
      <div style="font-size:12px;color:var(--sub)">待复习</div>
    </div>
    <div>
      <div id="mastered" style="font-size:24px;font-weight:700;color:var(--success)">0</div>
      <div style="font-size:12px;color:var(--sub)">已掌握</div>
    </div>
  </div>
</div>

<div id="list" class="card"></div>
<div id="empty" style="text-align:center;padding:60px;color:var(--sub);display:none">
  🎉 太棒了，暂无错字记录！
</div>

<div class="spacer"></div>
<nav class="tab-bar">
  <div class="tab-item" onclick="location.href='index.html'">
    <span class="tab-icon">🏠</span><span>首页</span>
  </div>
  <div class="tab-item" onclick="location.href='pending.html'">
    <span class="tab-icon">📋</span><span>批改</span>
  </div>
  <div class="tab-item active">
    <span class="tab-icon">📕</span><span>错题本</span>
  </div>
</nav>

<script>
const API = 'http://' + location.hostname + ':8080/api';

async function load() {
  const wb = await fetch(API + '/wrongbook?child_id=1').then(r=>r.json());
  const items = wb.wrongChars || [];
  if (items.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }
  const unreviewed = items.filter(w=>!w.reviewed).length;
  const mastered   = items.filter(w=> w.reviewed).length;
  document.getElementById('total').textContent = items.length;
  document.getElementById('unreviewed').textContent = unreviewed;
  document.getElementById('mastered').textContent = mastered;

  document.getElementById('list').innerHTML = items.map(w => (
    '<div style="display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #eee">'
    + '<div style="font-size:36px;margin-right:12px">' + (w.reviewed ? '✅' : '📕') + '</div>'
    + '<div style="flex:1">'
    + '<div style="font-size:20px;font-weight:700">' + w.char + '</div>'
    + '<div style="font-size:12px;color:var(--sub);margin-top:2px">' + (w.pinyin||'') + ' · 错' + w.wrong_count + '次 · 对' + w.correct_count + '次</div>'
    + '</div>'
    + (w.reviewed ? '<div style="color:var(--success);font-size:12px">已掌握</div>' : '')
    + '</div>'
  )).join('');
}
load();
</script>
</body>
</html>
