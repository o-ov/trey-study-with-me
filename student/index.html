<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小树听写</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header style="text-align:center;padding:16px 0 8px">
    <div style="font-size:26px;font-weight:700">小树</div>
    <div id="level_badge" style="font-size:14px;color:var(--sub);margin-top:4px">Lv 1 · 识字小童</div>
  </header>

<div id="today_banner" class="card" style="display:none;background:linear-gradient(135deg,#4A90D9,#6BB5FF);color:#fff;cursor:pointer" onclick="location.href='today.html'">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-weight:700;font-size:15px">📅 今日任务</div>
      <div id="today_summary" style="font-size:13px;opacity:0.9;margin-top:4px">-</div>
    </div>
    <div style="font-size:24px">→</div>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
  <div class="card" style="text-align:center;cursor:pointer" onclick="location.href='today.html'">
    <div style="font-size:40px">📅</div>
    <div style="font-weight:700;margin-top:6px">今日任务</div>
    <div style="font-size:12px;color:var(--sub);margin-top:4px">查看每日任务</div>
  </div>
  <div class="card" style="text-align:center;cursor:pointer" onclick="location.href='dictation.html?mode=dictation'">
    <div style="font-size:40px">📝</div>
    <div style="font-weight:700;margin-top:6px">语文听写</div>
    <div style="font-size:12px;color:var(--sub);margin-top:4px">听发音写汉字</div>
  </div>
    <div class="card" style="text-align:center;cursor:pointer" onclick="location.href='dictation.html?mode=pinyin'">
      <div style="font-size:40px">🔤</div>
      <div style="font-weight:700;margin-top:6px">看拼音写</div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px">看拼音写词语</div>
    </div>
    <div class="card" style="text-align:center;cursor:pointer" onclick="location.href='review.html'">
      <div style="font-size:40px">📕</div>
      <div style="font-weight:700;margin-top:6px">错题复习</div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px">强化记忆</div>
    </div>
    <div class="card" style="text-align:center;cursor:pointer" onclick="location.href='profile.html'">
      <div style="font-size:40px">🎮</div>
      <div style="font-weight:700;margin-top:6px">我的勋章</div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px">成就奖励</div>
    </div>

  <div class="card" style="margin-top:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-weight:600">当前进度</span>
      <span id="pts_display" style="color:var(--accent)">⭐ 0 分</span>
    </div>
    <div class="progress-bar">
      <div id="progress_fill" class="progress-fill" style="width:0%"></div>
    </div>
    <div id="progress_text" style="font-size:12px;color:var(--sub);margin-top:4px;text-align:right">0 / 100 分</div>
  </div>

  <div class="card" style="margin-top:12px">
    <div style="display:flex;justify-content:space-around;text-align:center">
      <div>
        <div style="font-size:22px">🔥</div>
        <div style="font-size:13px;font-weight:600" id="streak_val">0</div>
        <div style="font-size:11px;color:var(--sub)">连续天数</div>
      </div>
      <div>
        <div style="font-size:22px">🏆</div>
        <div style="font-size:13px;font-weight:600" id="badge_count">0</div>
        <div style="font-size:11px;color:var(--sub)">已获勋章</div>
      </div>
      <div>
        <div style="font-size:22px">📕</div>
        <div style="font-size:13px;font-weight:600" id="wrong_count">0</div>
        <div style="font-size:11px;color:var(--sub)">错字数</div>
      </div>
    </div>
  </div>

<script>
const API = 'http://' + location.hostname + ':8080/api';

async function load() {
  try {
    const [prof, wb, todayRes] = await Promise.all([
      fetch(API + '/profile').then(r=>r.json()),
      fetch(API + '/wrongbook').then(r=>r.json()),
      fetch(API + '/daily-tasks/today').then(r=>r.json()).catch(()=>null)
    ]);
    document.getElementById('level_badge').textContent = 'Lv ' + prof.level + ' · ' + prof.level_name;
    document.getElementById('pts_display').textContent = '⭐ ' + prof.points + ' 分';
    document.getElementById('streak_val').textContent  = prof.streak_days;
    document.getElementById('badge_count').textContent = prof.badges.length;

    // 进度条：当前 session 数 / 升到下一级所需 session 数
    const curSess = prof.session_count || 0;
    const nextSess = prof.next_threshold || curSess;
    const pct = Math.min(100, Math.round((curSess / nextSess) * 100));
    document.getElementById('progress_fill').style.width = pct + '%';
    document.getElementById('progress_text').textContent = curSess + ' / ' + nextSess + ' 练习';

    // 今日任务 banner：按类型分组计数
    if (todayRes && todayRes.tasks && todayRes.tasks.length > 0) {
      const tasks = todayRes.tasks;
      const groups = {};
      for (const t of tasks) {
        if (!groups[t.task_type]) groups[t.task_type] = { total: 0, done: 0 };
        groups[t.task_type].total++;
        if (t.status === 'completed') groups[t.task_type].done++;
      }
      const totalTypes = Object.keys(groups).length;
      const doneTypes = Object.values(groups).filter(g => g.done === g.total).length;
      const banner = document.getElementById('today_banner');
      const summary = document.getElementById('today_summary');
      banner.style.display = 'block';
      summary.textContent = doneTypes >= totalTypes ? '✅ 全部完成' : `进行中 ${doneTypes}/${totalTypes}`;
    }

    document.getElementById('wrong_count').textContent = wb.wrongChars ? wb.wrongChars.length : 0;
  } catch(e) {
    console.error(e);
  }
}
load();
</script>
</body>
</html>
