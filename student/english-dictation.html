<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>英文听写</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); }
    .back-btn { color: #fff; text-decoration: none; font-size: 15px; padding: 4px 8px; border-radius: 8px; background: rgba(255,255,255,20%); }
    .page-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #4F46E5; color: #fff; }

    /* Type selection */
    .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; }
    .type-card {
      background: #fff; border-radius: 16px; padding: 20px 12px;
      text-align: center; cursor: pointer; border: 3px solid transparent;
      transition: border-color 0.2s, transform 0.1s;
    }
    .type-card:active { transform: scale(0.97); }
    .type-card.selected { border-color: #4F46E5; background: #EEF2FF; }
    .type-card .icon { font-size: 36px; display: block; margin-bottom: 8px; }
    .type-card .name { font-weight: 700; font-size: 14px; }
    .type-card .desc { font-size: 11px; color: var(--sub); margin-top: 4px; }
    .start-btn {
      display: block; width: calc(100% - 32px); margin: 0 16px 16px;
      padding: 14px; background: #4F46E5; color: #fff;
      border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer;
    }
    .start-btn:disabled { background: #ccc; cursor: default; }

    /* Quiz layout — all-in-one page */
    .quiz-container { padding: 16px; display: none; }
    .quiz-progress { font-size: 13px; color: var(--sub); text-align: center; margin-bottom: 12px; }
    .word-card {
      background: #fff; border-radius: 20px; padding: 24px 20px;
      text-align: center; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .word-main { font-size: 48px; font-weight: 800; color: var(--primary); margin-bottom: 4px; line-height: 1; }
    .word-sub { font-size: 14px; color: var(--sub); margin-bottom: 12px; }
    .play-btn {
      width: 60px; height: 60px; border-radius: 50%; background: #4F46E5;
      border: none; color: #fff; font-size: 24px; cursor: pointer;
      margin: 8px auto 12px; display: inline-flex; align-items: center; justify-content: center;
      transition: none;
    }
    .play-btn:active { transform: scale(0.93); background: #3730A3; }

    .section-label {
      font-size: 12px; font-weight: 700; color: var(--sub);
      text-align: left; margin: 12px 0 6px; padding-left: 4px;
    }
    .answer-input {
      width: 100%; padding: 12px; border: 2px solid #E5E7EB;
      border-radius: 12px; font-size: 20px; text-align: center;
      box-sizing: border-box; outline: none;
    }
    .answer-input:focus { border-color: #4F46E5; }
    .answer-input.correct { border-color: #22C55E; background: #F0FDF4; }
    .answer-input.wrong { border-color: #EF4444; background: #FEF2F2; }

    .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .choice-btn {
      padding: 12px 8px; border: 2px solid #E5E7EB; border-radius: 12px;
      background: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center; transition: none;
      line-height: 1.4; min-height: 52px; display: flex; align-items: center; justify-content: center;
    }
    .choice-btn:active { transform: scale(0.97); }
    .choice-btn.selected { border-color: #4F46E5; background: #EEF2FF; color: #3730A3; }
    .choice-btn.correct { border-color: #22C55E; background: #DCFCE7; color: #15803D; }
    .choice-btn.wrong { border-color: #EF4444; background: #FEE2E2; color: #DC2626; }

    .feedback-bar {
      display: flex; gap: 6px; margin-top: 10px; justify-content: center;
    }
    .feedback-item {
      padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 700;
    }
    .feedback-item.ok { background: #DCFCE7; color: #15803D; }
    .feedback-item.bad { background: #FEE2E2; color: #DC2626; }

    .submit-btn {
      display: block; width: 100%; margin-top: 14px; padding: 14px;
      background: #4F46E5; color: #fff; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .submit-btn:disabled { background: #ccc; cursor: default; }
    .next-hint {
      font-size: 13px; color: var(--sub); text-align: center; margin-top: 10px;
    }

    /* Irregular verb card */
    .verb-card { background: #fff; border-radius: 20px; padding: 24px 20px; text-align: center; margin-bottom: 14px; }
    .verb-original { font-size: 36px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
    .verb-meaning { font-size: 16px; color: var(--sub); margin-bottom: 16px; }

    /* Result */
    .result-container { padding: 24px 16px; text-align: center; display: none; }
    .result-icon { font-size: 72px; margin-bottom: 16px; }
    .result-score { font-size: 48px; font-weight: 800; color: #4F46E5; margin-bottom: 8px; }
    .result-detail { font-size: 15px; color: var(--sub); margin-bottom: 24px; }
    .result-actions { display: flex; gap: 12px; }
    .result-actions button {
      flex: 1; padding: 14px; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .result-back { background: #F3F4F6; color: var(--text); }
    .result-retry { background: #4F46E5; color: #fff; }

    /* Nav */
    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--border);
      display: flex; padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .nav-item { flex: 1; text-align: center; font-size: 11px; color: var(--sub); text-decoration: none; }
    .nav-item.active { color: #4F46E5; }
    .nav-item .nav-icon { font-size: 22px; display: block; }
    body { padding-bottom: 72px; }

    @media (orientation: landscape) {
      .quiz-container { padding: 12px 48px; }
      .word-main { font-size: 60px; }
      .type-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .type-card { padding: 24px 16px; }
      .type-card .icon { font-size: 44px; }
      .type-card .name { font-size: 16px; }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; border-radius: 2px;
      animation: confetti-fall 2.5s ease-in forwards; pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">← 返回</a>
  <span style="font-weight:700">英文听写</span>
</div>

<!-- 全页 loading 遮罩 -->
<div id="page-loading" style="position:fixed;inset:0;background:#f5f5f5;z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center">
  <div style="font-size:48px;margin-bottom:12px">📝</div>
  <div style="font-size:15px;color:#888">加载中…</div>
</div>

<!-- Type selection -->
<div id="type-view">
  <div style="padding:12px 16px 0;font-size:14px;color:var(--sub)">选择学习模式</div>
  <div class="type-grid">
    <div class="type-card" id="type-spelling" onclick="location.href='english-dictation.html?type=spelling'">
      <span class="icon">📝</span>
      <div class="name">Spelling</div>
      <div class="desc">听写 · 意思 · 词性</div>
    </div>
    <div class="type-card" id="type-irregular" onclick="location.href='english-dictation.html?type=irregular'">
      <span class="icon">🔄</span>
      <div class="name">Irregular Verbs</div>
      <div class="desc">不规则动词变形</div>
    </div>
    <div class="type-card" id="type-pep" onclick="location.href='english-dictation.html?type=pep'">
      <span class="icon">📖</span>
      <div class="name">PEP 词汇</div>
      <div class="desc">听写 · 意思</div>
    </div>
  </div>
  <button class="start-btn" id="btn-start" onclick="startQuiz()" disabled>开始学习</button>
</div>

<!-- Loading 遮罩 -->
<div id="loading-overlay" style="display:none;position:fixed;inset:0;background:rgba(255,255,255,0.92);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px">
  <div style="font-size:48px">🔊</div>
  <div style="font-size:16px;color:#666">正在加载音频…</div>
</div>
<script>
function showLoading() {
  document.getElementById('loading-overlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
}
</script>

<!-- Quiz mode -->
<div id="quiz-view" class="quiz-container">
  <div class="quiz-progress" id="quiz-progress"></div>
  <div id="word-area"></div>
</div>

<!-- Result -->
<div id="result-view" class="result-container">
  <div id="fireworks-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:9998"></div>
  <div class="result-icon" id="result-icon">🏆</div>
  <div class="result-score" id="result-score"></div>
  <div class="result-detail" id="result-detail"></div>
  <div id="streak-display" style="display:none;margin:12px auto 0;font-size:18px;font-weight:700;color:#F59E0B;text-align:center"></div>
  <div class="result-actions">
    <button class="result-back" onclick="location.href='index.html'">返回首页</button>
    <button class="result-retry" onclick="restartQuiz()">再来一次</button>
  </div>
</div>



<script>
const API = 'http://' + location.hostname + ':8080/api';
const TTS_BASE = 'http://' + location.hostname + ':8082';

let currentType = null;
let allWords = { spelling: [], irregular: [], pep: [] };
let quizWords = [];
let currentIdx = 0;
let correctCount = 0;
let currentStreak = 0;
let maxStreak = 0;
let wrongIds = new Set();
let scheduleMap = {}; // task_type -> schedule_id

// ── Load data ──────────────────────────────────────────────
async function loadWords() {
  const today = new Date().toISOString().slice(0, 10);
  try {
    const [spellingRes, irregularRes, pepRes, schedRes] = await Promise.all([
      fetch(API + '/english/words?type=spelling').then(r => r.json()),
      fetch(API + '/english/words?type=irregular').then(r => r.json()),
      fetch(API + '/english/words?type=pep').then(r => r.json()),
      fetch(API + '/english/schedule?child_id=1&date=' + today).then(r => r.json()),
    ]);
    allWords = {
      spelling: (spellingRes.words || []).map(w => ({ ...w, _type: 'spelling' })),
      irregular: (irregularRes.words || []).map(w => ({ ...w, _type: 'irregular' })),
      pep: (pepRes.words || []).map(w => ({ ...w, _type: 'pep' })),
    };
    scheduleMap = {};
    for (const s of (schedRes.tasks || [])) {
      scheduleMap[s.task_type] = s.id;
    }
    document.getElementById('type-spelling').querySelector('.desc').textContent =
      `${allWords.spelling.length} 词 · 听写/意思/词性`;
    document.getElementById('type-irregular').querySelector('.desc').textContent =
      `${allWords.irregular.length} 词 · 动词变形`;
    document.getElementById('type-pep').querySelector('.desc').textContent =
      `${allWords.pep.length} 词 · 听写/意思`;
  } catch(e) {
    console.error('[loadWords]', e);
    document.getElementById('type-spelling').querySelector('.desc').textContent = '加载失败';
    document.getElementById('type-irregular').querySelector('.desc').textContent = '加载失败';
    document.getElementById('type-pep').querySelector('.desc').textContent = '加载失败';
  }
}

function selectType(type) {
  currentType = type;
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('type-' + type).classList.add('selected');
  document.getElementById('btn-start').disabled = false;
  const names = { spelling: 'Spelling', irregular: 'Irregular Verbs', pep: 'PEP 词汇' };
  document.getElementById('btn-start').textContent = '开始学习 ' + names[type];
}

function startQuiz() {
  if (!currentType) return;
  quizWords = [...allWords[currentType]].sort(() => Math.random() - 0.5);
  currentIdx = 0;
  correctCount = 0;
  wrongIds.clear();
  currentStreak = 0;
  maxStreak = 0;
  document.getElementById('type-view').style.display = 'none';
  document.getElementById('quiz-view').style.display = 'block';
  document.getElementById('result-view').style.display = 'none';
  showWord();
}

function showWord() {
  const w = quizWords[currentIdx];
  const total = quizWords.length;
  console.log('[showWord] idx:', currentIdx, 'word:', w?.word);
  document.getElementById('quiz-progress').textContent = `${currentIdx + 1} / ${total}`;
  if (currentType === 'spelling') showSpelling(w);
  else if (currentType === 'irregular') showIrregular(w);
  else showPEP(w);
}

// ── Spelling: all in one page ───────────────────────────────
function showSpelling(w) {
  console.log('[showSpelling] word:', w.word);
  const meaningChoices = buildMeaningChoices(w, 'spelling');
  const posChoices = buildPOSChoices(w);
  const html = `
    <div class="word-card">
      <button class="play-btn" id="play-btn" onclick="playWord('${w.word}')">🔊</button>
      <div style="font-size:13px;color:var(--sub);margin:6px 0 14px">点击播放，听写单词</div>
      <div class="section-label">✏️ 拼写</div>
      <input class="answer-input" id="spell-input" autocomplete="off" autocorrect="off"
             spellcheck="false" placeholder="输入英语单词"
             oninput="updateSubmitBtn()">
    </div>
    <div class="word-card">
      <div class="section-label">📖 选择中文意思</div>
      <div class="choices-grid" id="meaning-choices">
        ${meaningChoices.map((c, i) => `<button class="choice-btn" data-idx="${i}" onclick="pickChoice('meaning',${i},'${c.replace(/'/g,"\\'")}')">${c}</button>`).join('')}
      </div>
    </div>
    <div class="word-card">
      <div class="section-label">🏷️ 选择词性</div>
      <div class="choices-grid" id="pos-choices">
        ${posChoices.map((c, i) => `<button class="choice-btn" data-idx="${i}" onclick="pickChoice('pos',${i},'${c}')">${c}</button>`).join('')}
      </div>
    </div>
    <div id="feedback-area"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitSpelling()" disabled>提交答案</button>
  `;
  document.getElementById('word-area').innerHTML = html;
  setTimeout(() => {
    const el = document.getElementById('spell-input');
    if (el) el.focus();
    playWord(w.word);
  }, 150);
  window._selectedMeaning = null;
  window._selectedPOS = null;
  window._currentWord = w;
}

function updateSubmitBtn() {
  const spellVal = document.getElementById('spell-input')?.value.trim();
  const btn = document.getElementById('submit-btn');
  if (!btn) return;
  btn.disabled = !(spellVal && window._selectedMeaning !== null && window._selectedPOS !== null);
}

function pickChoice(type, idx, val) {
  const container = document.getElementById(type + '-choices');
  container.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  if (type === 'meaning') window._selectedMeaning = val;
  else window._selectedPOS = val;
  updateSubmitBtn();
}

function submitSpelling() {
  const w = window._currentWord;
  const input = document.getElementById('spell-input');
  const spellVal = input.value.trim().toLowerCase();
  const correctSpell = w.word.toLowerCase();
  const spellOk = spellVal === correctSpell;

  const meaningOk = window._selectedMeaning === w.meaning;
  const posOk = window._selectedPOS === (w.pos || '其他');

  input.disabled = true;
  input.classList.add(spellOk ? 'correct' : 'wrong');

  // meaning
  const meaningBtns = document.getElementById('meaning-choices').querySelectorAll('.choice-btn');
  meaningBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === w.meaning) b.className = 'choice-btn correct';
    else if (b.classList.contains('selected') && !meaningOk) b.className = 'choice-btn wrong';
  });

  // pos
  const posBtns = document.getElementById('pos-choices').querySelectorAll('.choice-btn');
  posBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === (w.pos || '其他')) b.className = 'choice-btn correct';
    else if (b.classList.contains('selected') && !posOk) b.className = 'choice-btn wrong';
  });

  const allOk = spellOk && meaningOk && posOk;
  if (allOk) {
    correctCount++;
    currentStreak++;
    if (currentStreak > maxStreak) maxStreak = currentStreak;
  } else {
    currentStreak = 0;
    wrongIds.add(w.id);
    recordWrongbook(w, spellVal);
  }

  document.getElementById('feedback-area').innerHTML = `
    <div class="feedback-bar">
      <span class="feedback-item ${spellOk ? 'ok' : 'bad'}">拼写 ${spellOk ? '✅' : '❌'}</span>
      <span class="feedback-item ${meaningOk ? 'ok' : 'bad'}">意思 ${meaningOk ? '✅' : '❌'}</span>
      <span class="feedback-item ${posOk ? 'ok' : 'bad'}">词性 ${posOk ? '✅' : '❌'}</span>
    </div>
  `;
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('word-area').innerHTML += `<div class="next-hint" id="next-hint">即将进入下一题…</div>`;
  setTimeout(toNextWord, 1200);
}

function buildMeaningChoices(correctWord, poolKey) {
  const pool = poolKey === 'spelling' ? allWords.spelling : allWords.pep;
  const others = pool.map(w2 => w2.meaning).filter(m => m && m !== correctWord.meaning);
  const choices = others.sort(() => Math.random() - 0.5).slice(0, 3);
  choices.push(correctWord.meaning);
  return choices.sort(() => Math.random() - 0.5);
}

function buildPOSChoices(w) {
  const all = ['n.', 'v.', 'adj.', 'adv.', 'pron.', 'prep.', 'conj.', 'n./ adj.', 'adj./ v.', 'v./ n.', 'n./ v.'];
  const correct = w.pos || '其他';
  const others = all.filter(p => p !== correct);
  const choices = others.sort(() => Math.random() - 0.5).slice(0, 3);
  choices.push(correct);
  return choices.sort(() => Math.random() - 0.5);
}

// ── PEP: all in one page ───────────────────────────────────
function showPEP(w) {
  const meaningChoices = buildMeaningChoices(w, 'pep');
  const html = `
    <div class="word-card">
      <button class="play-btn" id="play-btn" onclick="playWord('${w.word}')">🔊</button>
      <div style="font-size:13px;color:var(--sub);margin:6px 0 14px">点击播放，听写单词</div>
      <div class="section-label">✏️ 拼写</div>
      <input class="answer-input" id="spell-input" autocomplete="off" autocorrect="off"
             spellcheck="false" placeholder="输入英语单词"
             oninput="updateSubmitBtnPEP()">
    </div>
    <div class="word-card">
      <div class="section-label">📖 选择中文意思</div>
      <div class="choices-grid" id="meaning-choices">
        ${meaningChoices.map((c, i) => `<button class="choice-btn" data-idx="${i}" onclick="pickChoicePEP(${i},'${c.replace(/'/g,"\\'")}')">${c}</button>`).join('')}
      </div>
    </div>
    <div id="feedback-area"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitPEP()" disabled>提交答案</button>
  `;
  document.getElementById('word-area').innerHTML = html;
  setTimeout(() => {
    const el = document.getElementById('spell-input');
    if (el) el.focus();
    playWord(w.word);
  }, 150);
  window._selectedMeaning = null;
  window._currentWord = w;
}

function updateSubmitBtnPEP() {
  const spellVal = document.getElementById('spell-input')?.value.trim();
  const btn = document.getElementById('submit-btn');
  if (!btn) return;
  btn.disabled = !(spellVal && window._selectedMeaning !== null);
}

function pickChoicePEP(idx, val) {
  document.querySelectorAll('#meaning-choices .choice-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  window._selectedMeaning = val;
  updateSubmitBtnPEP();
}

function submitPEP() {
  const w = window._currentWord;
  const input = document.getElementById('spell-input');
  const spellVal = input.value.trim().toLowerCase();
  const spellOk = spellVal === w.word.toLowerCase();
  const meaningOk = window._selectedMeaning === w.meaning;

  input.disabled = true;
  input.classList.add(spellOk ? 'correct' : 'wrong');

  const meaningBtns = document.getElementById('meaning-choices').querySelectorAll('.choice-btn');
  meaningBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === w.meaning) b.className = 'choice-btn correct';
    else if (b.classList.contains('selected') && !meaningOk) b.className = 'choice-btn wrong';
  });

  const allOk = spellOk && meaningOk;
  if (allOk) {
    correctCount++;
    currentStreak++;
    if (currentStreak > maxStreak) maxStreak = currentStreak;
  } else {
    currentStreak = 0;
    wrongIds.add(w.id);
    recordWrongbook(w, spellVal);
  }

  document.getElementById('feedback-area').innerHTML = `
    <div class="feedback-bar">
      <span class="feedback-item ${spellOk ? 'ok' : 'bad'}">拼写 ${spellOk ? '✅' : '❌'}</span>
      <span class="feedback-item ${meaningOk ? 'ok' : 'bad'}">意思 ${meaningOk ? '✅' : '❌'}</span>
    </div>
  `;
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('word-area').innerHTML += `<div class="next-hint" id="next-hint">即将进入下一题…</div>`;
  setTimeout(toNextWord, 1200);
}

// ── Irregular Verbs: all in one page ──────────────────────
function showIrregular(w) {
  const [base, past] = w.word.split('/');
  const html = `
    <div class="verb-card">
      <div class="verb-original">${base}</div>
      <div class="verb-meaning">${w.meaning}</div>
      <div class="section-label">🔄 填写过去式</div>
      <input class="answer-input" id="tense-input" autocomplete="off" autocorrect="off"
             spellcheck="false" placeholder="输入过去式"
             oninput="updateSubmitBtnIrregular()">
    </div>
    <div id="feedback-area"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitIrregular('${past}')" disabled>提交答案</button>
  `;
  document.getElementById('word-area').innerHTML = html;
  document.getElementById('tense-input').focus();
  window._currentWord = w;
  window._correctPast = past;
}

function updateSubmitBtnIrregular() {
  const val = document.getElementById('tense-input')?.value.trim();
  const btn = document.getElementById('submit-btn');
  if (!btn) return;
  btn.disabled = !val;
}

function submitIrregular(correctPast) {
  const input = document.getElementById('tense-input');
  const userVal = input.value.trim().toLowerCase();
  const ok = userVal === correctPast.toLowerCase();
  input.disabled = true;
  input.classList.add(ok ? 'correct' : 'wrong');
  if (!ok) {
    wrongIds.add(window._currentWord.id);
    recordWrongbook(window._currentWord, userVal);
    currentStreak = 0;
  } else {
    correctCount++;
    currentStreak++;
    if (currentStreak > maxStreak) maxStreak = currentStreak;
  }
  document.getElementById('feedback-area').innerHTML = `
    <div class="feedback-bar">
      <span class="feedback-item ${ok ? 'ok' : 'bad'}">${ok ? '✅ 正确！' : '❌ 正确答案：' + correctPast}</span>
    </div>
  `;
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('word-area').innerHTML += `<div class="next-hint">即将进入下一题…</div>`;
  setTimeout(toNextWord, 1200);
}

// ── Shared helpers ─────────────────────────────────────────
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playWord(word) {
  showLoading();
  fetch(TTS_BASE + '/tts?text=' + encodeURIComponent(word) + '&voice=en')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.arrayBuffer();
    })
    .then(buf => {
      const ctx = getAudioCtx();
      return ctx.decodeAudioData(buf).then(audioBuffer => ({ ctx, audioBuffer }));
    })
    .then(({ ctx, audioBuffer }) => {
      hideLoading();
      const src = ctx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(ctx.destination);
      src.start(0);
    })
    .catch(e => {
      hideLoading();
      console.error('[TTS play error]', e);
    });
}

function toNextWord() {
  currentIdx++;
  if (currentIdx < quizWords.length) showWord();
  else showResult();
}

function showResult() {
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
  const totalSteps = currentType === 'spelling' ? quizWords.length * 3 : currentType === 'pep' ? quizWords.length * 2 : quizWords.length;
  const pct = Math.round(correctCount / totalSteps * 100);
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-detail').textContent = `答对 ${correctCount} 题（共 ${quizWords.length} 词）`;
  document.getElementById('result-icon').textContent = pct >= 90 ? '🏆' : pct >= 70 ? '👍' : '💪';

  // 连对展示
  const streakEl = document.getElementById('streak-display');
  if (maxStreak >= 3) {
    streakEl.style.display = 'block';
    streakEl.textContent = '🔥 连续答对 ' + maxStreak + ' 题！';
    launchFireworks(maxStreak);
  } else {
    streakEl.style.display = 'none';
  }

  // 记录打卡并获取积分奖励
  const today = new Date().toISOString().slice(0, 10);
  const newDetail = {};
  newDetail[currentType] = correctCount;
  const existing = window._enLogDetail || {};
  const merged = { ...existing, ...newDetail };
  window._enLogDetail = merged;

  fetch(API + '/english/daily-log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      child_id: 1,
      date: today,
      task_type: 'en_dictation',
      score: correctCount,
      total: quizWords.length,
      detail: JSON.stringify(merged)
    })
  }).then(r => r.json()).then(data => {
    if (data.points_added) {
      showPointsAward(data.points_added, data.badges_added);
    }
  }).catch(() => {});

  // 标记 schedule 任务完成（后端已自动处理，这里保留以防万一）
  const schedId = scheduleMap[currentType];
  if (schedId) {
    fetch(API + '/english/schedule/' + schedId + '/complete', { method: 'POST' }).catch(() => {});
  }
}

function showPointsAward(points, badges) {
  let html = `<div class="points-award">+${points} 积分</div>`;
  if (badges && badges.length > 0) {
    html += `<div class="badge-award">🎉 新勋章：${badges.join('、')}</div>`;
  }
  const el = document.createElement('div');
  el.innerHTML = html;
  el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;text-align:center;';
  document.body.appendChild(el);
  // 动画淡出
  [el.querySelector('.points-award'), el.querySelector('.badge-award')].filter(Boolean).forEach(e => {
    e.style.animation = 'none';
    e.offsetHeight;
    e.style.animation = 'points-pop 2s ease-out forwards';
  });
  setTimeout(() => el.remove(), 2500);
}

function launchFireworks(streak) {
  const count = Math.min(6, 3 + Math.floor((streak - 3) / 2));
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9F1C'];
  const emojis = ['🎉','🎆','✨','🌟','💫','🔥'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.textContent = emojis[i % emojis.length];
      piece.style.left = (10 + Math.random() * 80) + 'vw';
      piece.style.top = (10 + Math.random() * 30) + 'vh';
      piece.style.fontSize = (20 + Math.random() * 16) + 'px';
      piece.style.animationDuration = (2 + Math.random() * 1.5) + 's';
      piece.style.color = colors[Math.floor(Math.random() * colors.length)];
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 4000);
    }, i * 250);
  }
}

function restartQuiz() {
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('type-view').style.display = 'block';
  currentType = null;
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('btn-start').disabled = true;
}

function recordWrongbook(w, userAnswer) {
  fetch(API + '/english/wrongbook', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      word_id: w.id, word: w.word, answer: userAnswer || '', correct: 0,
      word_type: w._type || w.word_type || '', lesson: w.lesson || '', meaning: w.meaning || ''
    })
  }).catch(() => {});
}

loadWords().then(() => {
  document.getElementById('page-loading').style.display = 'none';
  const params = new URLSearchParams(location.search);
  const autoType = params.get('type');
  if (autoType && ['spelling', 'irregular', 'pep'].includes(autoType)) {
    selectType(autoType);
    startQuiz();
  }
});
