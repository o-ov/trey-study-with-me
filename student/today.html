<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今日任务</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); }
    .task-card {
      background: #fff; border-radius: 20px;
      padding: 22px 20px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .task-card:active { transform: scale(0.98); }
    .task-card.done { opacity: 0.7; }
    .task-icon { font-size: 40px; flex-shrink: 0; }
    .task-body { flex: 1; }
    .task-name { font-weight: 700; font-size: 17px; color: var(--text); margin-bottom: 4px; }
    .task-sub { font-size: 13px; color: var(--sub); }
    .task-badge {
      padding: 4px 12px; border-radius: 99px;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .task-badge.active { background: #FFF2F0; color: #D46B08; }
    .task-badge.done { background: #F6FFED; color: var(--success); }
    .arrow { font-size: 20px; color: #ccc; flex-shrink: 0; }
    .done .arrow { display: none; }
    .date-banner {
      text-align: center; padding: 16px 0 10px;
      font-size: 13px; color: var(--sub); font-weight: 600;
    }
    /* English section */
    .section-label {
      font-size: 13px; font-weight: 700; color: var(--sub);
      padding: 16px 0 8px; border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .lang-tag {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 6px; margin-bottom: 4px;
    }
    .lang-tag.en { background: #EEF2FF; color: #4F46E5; }
  </style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">← 返回</a>
  <span>📅 今日任务</span>
</div>

<style>
.back-btn {
  color: #fff;
  text-decoration: none;
  font-size: 15px;
  padding: 4px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,20%);
}
</style>

<div id="content">
  <div class="date-banner" id="date-banner"></div>
  <div id="task-list"></div>
</div>

<div id="loading" style="text-align:center;padding:80px 0;color:var(--sub);font-size:15px">加载中...</div>
<div id="empty" style="display:none;text-align:center;padding:80px 0">
  <div style="font-size:56px;margin-bottom:16px">📋</div>
  <div style="font-size:17px;font-weight:700;margin-bottom:8px">今日暂无任务</div>
  <div style="font-size:14px;color:var(--sub)">家长设置后即可开始</div>
</div>

<script>
const API = 'http://' + location.hostname + ':8080/api';

async function load() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  try {
    const cnRes = await fetch(API + '/daily-tasks/today?child_id=1');
    const cnData = await cnRes.json();
    const enRes = await fetch(API + '/english/schedule?child_id=1&date=' + cnData.date);
    const enData = await enRes.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    // 日期
    const d = new Date();
    document.getElementById('date-banner').textContent =
      d.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });

    // 语文任务
    const cnTasks = cnData.tasks || [];
    // 英语每日任务（今天应做的）
    const enSchedules = (enData.tasks || [])
      .filter(s => s.date === cnData.date && s.status !== 'completed');

    if (cnTasks.length === 0 && enSchedules.length === 0) {
      document.getElementById('content').style.display = 'none';
      document.getElementById('empty').style.display = 'block';
      return;
    }

    render(cnTasks, enSchedules);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
}

function render(cnTasks, enSchedules) {
  const groups = {};
  for (const t of cnTasks) {
    if (!groups[t.task_type]) groups[t.task_type] = [];
    groups[t.task_type].push(t);
  }

  const cards = [];

  // 语文任务
  if (groups.dictation) {
    const allDone = groups.dictation.every(t => t.status === 'completed');
    const totalWords = groups.dictation.reduce((sum, t) => sum + (t.words ? t.words.length : 0), 0);
    const task = groups.dictation[0];
    cards.push({
      icon: '📝', name: '语文听写',
      sub: allDone ? '已完成' : (totalWords + '个字等着你'),
      done: allDone, type: 'dictation', taskId: task.id, lang: 'cn'
    });
  }

  if (groups.recite) {
    const allDone = groups.recite.every(t => t.status === 'completed');
    const content = groups.recite[0]?.content || '';
    const short = content.length > 20 ? content.slice(0, 20) + '…' : content;
    cards.push({
      icon: '🎤', name: '背诵',
      sub: allDone ? '已完成' : (short || '点击开始'),
      done: allDone, type: 'recite', taskId: groups.recite[0]?.id, lang: 'cn'
    });
  }

  if (groups.wrongbook && groups.wrongbook.length > 0) {
    const totalWrongTasks = groups.wrongbook.length;
    const doneWrongTasks = groups.wrongbook.filter(t => t.status === 'completed').length;
    const allDone = doneWrongTasks === totalWrongTasks;
    cards.push({
      icon: '📕', name: '错题复习',
      sub: allDone ? '已完成' : (totalWrongTasks + '道题待巩固'),
      done: allDone, type: 'wrongbook', taskId: null, lang: 'cn'
    });
  }

  // 英语每日任务：综合听写 + 阅读，两张卡
  const hasEnSchedules = enSchedules.length > 0;
  if (hasEnSchedules) {
    // 英语听写：跳 english.html（内部自己组合 L30+L31+Set.3+Unit5）
    cards.push({
      icon: '🔤', name: '英语听写', sub: '拼写·不规则动词·PEP词汇',
      done: false, type: 'en_dictation', taskId: null, lang: 'en'
    });
    // 英语阅读
    cards.push({
      icon: '📄', name: '英语阅读', sub: '阅读理解打卡',
      done: false, type: 'en_reading', taskId: null, lang: 'en'
    });
  }

  const list = document.getElementById('task-list');
  list.innerHTML = cards.map((c, i) => `
    <div class="task-card ${c.done ? 'done' : ''}" onclick="go(${i}, '${c.lang}')">
      <div class="task-icon">${c.icon}</div>
      <div class="task-body">
        ${c.lang === 'en' ? '<span class="lang-tag en">EN</span>' : ''}
        <div class="task-name">${c.name}</div>
        <div class="task-sub">${c.sub}</div>
      </div>
      <span class="task-badge ${c.done ? 'done' : 'active'}">${c.done ? '已完成' : '开始'}</span>
      <div class="arrow">›</div>
    </div>
  `).join('');
  window._cards = cards;
}

function go(idx, lang) {
  const card = window._cards[idx];
  const type = card.type;
  const taskId = card.taskId;
  if (lang === 'cn') {
    if (type === 'dictation') {
      location.href = 'dictation.html?task_id=' + taskId;
    } else if (type === 'recite') {
      location.href = 'recite.html?task_id=' + taskId;
    } else if (type === 'wrongbook') {
      location.href = 'review.html';
    }
  } else if (lang === 'en') {
    if (type === 'en_dictation') {
      location.href = 'english-dictation.html';
    } else if (type === 'en_reading') {
      location.href = 'english-articles.html';
    }
  }
}

load();
</script>
</body>
</html>
