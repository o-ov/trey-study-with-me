<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的成就</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .badge-card {
      display: flex; flex-direction: column; align-items: center;
      width: 80px; padding: 10px 4px;
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .badge-card:hover { transform: scale(1.05); }
    .badge-card.locked { opacity: 0.45; filter: grayscale(1); }
    .badge-icon { font-size: 30px; }
    .badge-name { font-size: 10px; color: var(--sub); margin-top: 4px; text-align: center; line-height: 1.3; }
    .badge-hint {
      font-size: 9px; color: #aaa; margin-top: 3px; text-align: center;
      line-height: 1.3; padding: 0 2px;
    }
    .badge-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      display: none;
    }
    .badge-modal-overlay.show { display: flex; }
    .badge-modal {
      background: #fff; border-radius: 20px;
      width: 280px; padding: 28px 24px 24px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .badge-modal-icon { font-size: 64px; margin-bottom: 12px; }
    .badge-modal-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .badge-modal-condition {
      background: #f0f4ff; border-radius: 10px;
      padding: 12px 16px; font-size: 14px;
      color: var(--text); line-height: 1.6;
      margin-bottom: 20px;
    }
    .badge-modal-status {
      font-size: 13px; margin-bottom: 16px;
      color: var(--sub);
    }
    .badge-modal-status.earned { color: #27ae60; font-weight: 600; }
    .badge-modal-status.locked { color: #e74c3c; }
    .badge-modal-close {
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      width: 100%; padding: 12px;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
    }
    .robot-avatar {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .robot-avatar svg { width: 60px; height: 60px; }
  </style>
</head>
<body>

<div class="page-header">
  <button class="back-btn" onclick="history.back()">←</button>
  <span>🎮 我的成就</span>
</div>

<div class="card" style="text-align:center">
  <!-- 擎天柱风格机器人头像 -->
  <div class="robot-avatar" style="margin:0 auto 8px">
    <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
      <!-- 头部主体 -->
      <rect x="14" y="12" width="32" height="28" rx="4" fill="#e74c3c"/>
      <!-- 银色面具 -->
      <rect x="17" y="16" width="26" height="14" rx="2" fill="#bdc3c7"/>
      <!-- 眼睛（蓝色发光） -->
      <rect x="20" y="19" width="8" height="5" rx="1" fill="#3498db"/>
      <rect x="32" y="19" width="8" height="5" rx="1" fill="#3498db"/>
      <!-- 眉毛 -->
      <rect x="19" y="17" width="9" height="2" rx="1" fill="#2c3e50"/>
      <rect x="32" y="17" width="9" height="2" rx="1" fill="#2c3e50"/>
      <!-- 嘴 -->
      <rect x="22" y="29" width="16" height="3" rx="1" fill="#2c3e50"/>
      <!-- 头顶缝隙 -->
      <rect x="28" y="12" width="4" height="4" rx="1" fill="#c0392b"/>
      <!-- 颈部 -->
      <rect x="26" y="40" width="8" height="4" fill="#7f8c8d"/>
      <!-- 肩部 -->
      <rect x="6" y="38" width="12" height="8" rx="3" fill="#e74c3c"/>
      <rect x="42" y="38" width="12" height="8" rx="3" fill="#e74c3c"/>
      <!-- 肩部银条 -->
      <rect x="8" y="40" width="8" height="4" rx="1" fill="#bdc3c7"/>
      <rect x="44" y="40" width="8" height="4" rx="1" fill="#bdc3c7"/>
    </svg>
  </div>
  <div id="name" style="font-size:20px;font-weight:700">小树</div>
  <div id="level_name" style="color:var(--primary);font-size:15px;margin-top:4px">Lv 1 · 识字小童</div>
  <div style="margin-top:12px">
    <div class="progress-bar" style="height:14px">
      <div id="progress_fill" class="progress-fill" style="width:0%"></div>
    </div>
    <div style="font-size:13px;color:var(--sub);margin-top:6px">
      ⏺️ <span id="sess_count">0</span>/<span id="next_info">0</span>次练习
    </div>
  </div>
</div>

<div class="card" style="margin-top:12px">
  <div style="display:flex;justify-content:space-around">
    <div style="text-align:center">
      <div style="font-size:32px">🔥</div>
      <div id="streak_days" style="font-size:22px;font-weight:700">0</div>
      <div style="font-size:12px;color:var(--sub)">天</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:32px">⭐</div>
      <div id="total_pts" style="font-size:22px;font-weight:700">0</div>
      <div style="font-size:12px;color:var(--sub)">总积分</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:32px">🏆</div>
      <div id="badge_num" style="font-size:22px;font-weight:700">0</div>
      <div style="font-size:12px;color:var(--sub)">勋章</div>
    </div>
  </div>
</div>

<div class="card" style="margin-top:12px">
  <div style="font-weight:700;margin-bottom:12px">🏅 全部勋章（点击查看解锁条件）</div>
  <div id="badges_grid" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-start"></div>
</div>

<!-- 勋章详情弹层 -->
<div id="badge_modal" class="badge-modal-overlay" onclick="closeBadgeModal(event)">
  <div class="badge-modal" onclick="event.stopPropagation()">
    <div id="bm_icon" class="badge-modal-icon"></div>
    <div id="bm_name" class="badge-modal-name"></div>
    <div id="bm_status" class="badge-modal-status"></div>
    <div id="bm_condition" class="badge-modal-condition"></div>
    <button class="badge-modal-close" onclick="closeBadgeModal()">知道了</button>
  </div>
</div>

<div class="card" style="margin-top:12px">
  <div style="font-weight:700;margin-bottom:12px">🎁 积分兑换</div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;align-items:center;padding:12px;background:#F9F9F9;border-radius:10px;cursor:pointer" onclick="redeem('pokemon_poster',500)">
      <div style="font-size:28px;margin-right:12px">🦸</div>
      <div style="flex:1">
        <div style="font-weight:600">Pokemon 炫酷海报</div>
        <div style="font-size:12px;color:var(--sub)">线下兑换</div>
      </div>
      <div style="color:var(--accent);font-weight:700">500 ⭐</div>
    </div>
    <div style="display:flex;align-items:center;padding:12px;background:#F9F9F9;border-radius:10px;cursor:pointer" onclick="redeem('nice_dinner',1000)">
      <div style="font-size:28px;margin-right:12px">🍽️</div>
      <div style="flex:1">
        <div style="font-weight:600">大餐一顿</div>
        <div style="font-size:12px;color:var(--sub)">线下兑换</div>
      </div>
      <div style="color:var(--accent);font-weight:700">1000 ⭐</div>
    </div>
    <div style="display:flex;align-items:center;padding:12px;background:#F9F9F9;border-radius:10px;cursor:pointer" onclick="redeem('movie_day',2000)">
      <div style="font-size:28px;margin-right:12px">🎬</div>
      <div style="flex:1">
        <div style="font-weight:600">全家看电影/游乐园</div>
        <div style="font-size:12px;color:var(--sub)">线下兑换</div>
      </div>
      <div style="color:var(--accent);font-weight:700">2000 ⭐</div>
    </div>
  </div>
</div>

<script>
const API = 'http://' + location.hostname + ':8080/api';

// 勋章解锁条件说明
const BADGE_HINTS = {
  first_practice: '完成第1次练习',
  neat_writer: '单次练习连续5字全对',
  streak_3: '连续练习3天',
  perfect_10: '单次练习10字全对',
  wrongbook_cleared_20: '累计复习20个错字',
  streak_7: '连续练习7天',
  hundred_perfect: '累计100字全对',
  monthly_practitioner: '累计练习30天',
  lv10: '达到Lv10'
};

async function load() {
  const [prof, allBadges] = await Promise.all([
    fetch(API + '/profile').then(r=>r.json()),
    fetch(API + '/badges').then(r=>r.json())
  ]);

  document.getElementById('name').textContent = prof.name;
  document.getElementById('level_name').textContent = 'Lv ' + prof.level + ' · ' + prof.level_name;
  document.getElementById('total_pts').textContent = prof.points;
  document.getElementById('streak_days').textContent = prof.streak_days;
  document.getElementById('badge_num').textContent = prof.badges.length;
  document.getElementById('sess_count').textContent = prof.session_count || 0;
  document.getElementById('next_info').textContent = prof.next_threshold || 0;

  const pct = prof.progress_pct || 0;
  document.getElementById('progress_fill').style.width = pct + '%';

  const earnedIds = new Set(prof.badges.map(b=>b.id));
  const grid = document.getElementById('badges_grid');
  grid.innerHTML = allBadges.map(b => {
    const earned = earnedIds.has(b.id);
    const hint = BADGE_HINTS[b.badge_key] || b.condition || '';
    return '<div class="badge-card ' + (earned ? '' : 'locked') + '" '
      + 'data-id="' + b.id + '" data-name="' + b.name + '" data-icon="' + b.icon + '" '
      + 'data-condition="' + hint + '" data-earned="' + earned + '" '
      + 'onclick="showBadgeModal(this)">'
      + '<div class="badge-icon">' + b.icon + '</div>'
      + '<div class="badge-name">' + b.name + '</div></div>';
  }).join('');
}

function showBadgeModal(el) {
  document.getElementById('bm_icon').textContent = el.dataset.icon;
  document.getElementById('bm_name').textContent = el.dataset.name;
  const earned = el.dataset.earned === 'true';
  const statusEl = document.getElementById('bm_status');
  if (earned) {
    statusEl.textContent = '✅ 已获得';
    statusEl.className = 'badge-modal-status earned';
  } else {
    statusEl.textContent = '🔒 还未获得';
    statusEl.className = 'badge-modal-status locked';
  }
  document.getElementById('bm_condition').textContent = '解锁方式：' + el.dataset.condition;
  document.getElementById('badge_modal').classList.add('show');
}

function closeBadgeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('badge_modal').classList.remove('show');
}

async function redeem(key, pts) {
  if (!confirm('申请兑换？')) return;
  await fetch(API + '/rewards/redeem', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ reward: key, points: pts })
  });
  alert('✅ 兑换申请已提交，请等爸爸妈妈确认！');
}

load();
</script>
</body>
</html>
