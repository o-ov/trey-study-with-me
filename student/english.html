<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英语听写</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); font-family: 'Microsoft YaHei', sans-serif; }
    .header {
      background: linear-gradient(135deg, #004BFE, #0066FF);
      color: #fff; padding: 18px 16px 14px;
      border-radius: 0 0 20px 20px;
    }
    .header h1 { font-size: 1.1rem; margin: 0 0 4px; }
    .header p { font-size: 0.8rem; opacity: 0.85; margin: 0; }
    .header .back-btn {
      color: #fff; text-decoration: none; font-size: 14px;
      padding: 4px 8px; border-radius: 8px;
      background: rgba(255,255,255,20%); display: inline-block; margin-bottom: 8px;
    }

    .task-section { margin: 16px; }

    /* Word item */
    .word-item {
      background: var(--card); border-radius: 16px;
      padding: 20px 16px; margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .word-item-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .word-badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 20px; font-size: 0.7rem; font-weight: 600;
    }
    .word-badge.spelling { background: #E8F0FF; color: #004BFE; }
    .word-badge.irregular { background: #FFF3E0; color: #E65100; }
    .word-badge.pep { background: #E0F7EF; color: #006644; }

    /* Dictation area */
    .dictation-center {
      text-align: center; padding: 16px 0;
    }
    .play-btn {
      background: #004BFE; color: #fff;
      border: none; border-radius: 50%;
      width: 60px; height: 60px;
      font-size: 1.5rem; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .play-btn:active { transform: scale(0.95); }
    .dictation-hint { font-size: 0.85rem; color: #666; margin-top: 8px; }

    /* Input */
    .answer-input {
      width: 100%; box-sizing: border-box;
      padding: 12px 16px; font-size: 1.05rem;
      border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--bg); color: var(--text);
      margin-top: 12px; text-align: center; font-weight: 600;
    }
    .answer-input:focus { outline: none; border-color: var(--primary); }

    /* Choices */
    .choices { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .choice-btn {
      padding: 10px 14px; border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--bg); color: var(--text);
      font-size: 0.9rem; text-align: left;
      cursor: pointer; transition: all 0.15s;
    }
    .choice-btn:hover { border-color: var(--primary); }
    .choice-btn.selected { border-color: var(--primary); background: #E8F0FF; color: var(--primary); font-weight: 600; }

    /* Irregular verb */
    .verb-sentence {
      font-size: 0.95rem; color: #333;
      background: #F5F5F5; padding: 12px 14px;
      border-radius: 10px; margin-bottom: 10px; line-height: 1.8;
    }
    .verb-blank {
      display: inline-block; min-width: 90px;
      border-bottom: 2px solid #004BFE;
      margin: 0 4px; color: var(--primary); font-weight: 700;
    }

    /* Submit */
    .submit-btn {
      width: 100%; padding: 14px; border-radius: 14px;
      background: #004BFE; color: #fff;
      border: none; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 14px;
    }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Progress */
    .progress-bar {
      background: rgba(255,255,255,30%); border-radius: 8px;
      height: 6px; margin-top: 10px; overflow: hidden;
    }
    .progress-fill { background: #FFD800; height: 100%; border-radius: 8px; transition: width 0.3s; }
    .step-indicator { font-size: 0.78rem; opacity: 0.85; margin-top: 4px; }

    /* Feedback */
    .feedback-correct { color: #2E7D32; font-weight: 600; font-size: 0.9rem; }
    .feedback-wrong { color: #C62828; font-weight: 600; font-size: 0.9rem; }

    /* Done screen */
    .done-screen {
      text-align: center; padding: 40px 20px;
    }
    .done-screen .emoji { font-size: 3rem; margin-bottom: 12px; }
    .done-screen h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .done-screen .score-row {
      display: flex; justify-content: center; gap: 24px; margin: 20px 0;
    }
    .done-screen .score-box {
      background: var(--card); border-radius: 16px;
      padding: 16px 24px; border: 1px solid var(--border);
    }
    .done-screen .score-box .num { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .done-screen .score-box .label { font-size: 0.75rem; color: var(--sub); margin-top: 4px; }
    .done-screen .detail-link {
      color: #004BFE; font-size: 0.85rem; margin-top: 12px;
      cursor: pointer; text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back-btn" href="today.html">← 返回</a>
    <h1>🇬🇧 英语听写</h1>
    <p id="dateDisplay"></p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="step-indicator" id="stepIndicator">准备中...</div>
  </div>

  <div id="taskSection" class="task-section"></div>

  <script>
    const API = 'http://43.160.222.242:8080/api';

    // State
    let batchId = null;
    let allWords = [];        // 当前批次全部词
    let taskResults = {};      // 各类型结果

    // 当前阶段: spelling → irregular → pep
    const STAGES = [
      { type: 'spelling',  label: 'Spelling Words',    badge: 'spelling',  count: 12 },
      { type: 'irregular', label: 'Irregular Verbs',   badge: 'irregular', count: 8  },
      { type: 'pep',       label: 'PEP Words',          badge: 'pep',       count: 14 },
    ];
    let currentStageIdx = 0;
    let currentIdx = 0;

    function formatDate(d) {
      return `${d.getMonth()+1}月${d.getDate()}日`;
    }

    async function init() {
      const today = new Date();
      document.getElementById('dateDisplay').textContent = `今日任务 · ${formatDate(today)}`;

      // 获取当前英语批次
      try {
        const batchRes = await fetch(`${API}/parent/batch/list`);
        const batchData = await batchRes.json();
        const activeBatch = (batchData.batches || []).find(b => b.subject === 'en' && b.is_active);
        batchId = activeBatch ? activeBatch.id : null;
      } catch(e) { batchId = null; }

      // 加载全部词
      try {
        if (batchId) {
          const wordsRes = await fetch(`${API}/english/words?batch_id=${batchId}`);
          const wordsData = await wordsRes.json();
          allWords = wordsData.words || [];
        }
      } catch(e) { allWords = []; }

      // 初始化各阶段结果
      STAGES.forEach(s => {
        taskResults[s.type] = { answers: [], score: 0 };
      });

      startStage(0);
    }

    function startStage(stageIdx) {
      currentStageIdx = stageIdx;
      currentIdx = 0;

      if (stageIdx >= STAGES.length) {
        finishAll();
        return;
      }

      const stage = STAGES[stageIdx];
      const words = allWords.filter(w => w.word_type === stage.type);
      const daily = words.slice(0, stage.count);

      // 如果该类型没有词，跳到下一阶段
      if (daily.length === 0) {
        startStage(stageIdx + 1);
        return;
      }

      taskResults[stage.type]._words = daily;
      showWord(stage, daily);
    }

    function showWord(stage, daily) {
      if (currentIdx >= daily.length) {
        finishStage(stage, daily.length);
        return;
      }

      const w = daily[currentIdx];
      const container = document.getElementById('taskSection');
      const progress = ((currentStageIdx * daily.length + currentIdx) / (STAGES.length * stage.count)) * 100;

      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('stepIndicator').textContent =
        `${stage.label} ${currentIdx + 1}/${daily.length}`;

      if (stage.type === 'spelling') {
        container.innerHTML = buildSpellingItem(w, currentIdx + 1, daily.length, stage);
      } else if (stage.type === 'irregular') {
        container.innerHTML = buildIrregularItem(w, currentIdx + 1, daily.length, stage);
      } else if (stage.type === 'pep') {
        container.innerHTML = buildPepItem(w, currentIdx + 1, daily.length, stage);
      }
    }

    // ─── Spelling ────────────────────────────────────────────────────
    function buildSpellingItem(w, num, total, stage) {
      return `
      <div class="word-item">
        <div class="word-item-header">
          <span style="font-size:0.8rem;color:var(--sub)">${num} / ${total}</span>
          <span class="word-badge ${stage.badge}">${stage.label}</span>
        </div>
        <div class="dictation-center">
          <button class="play-btn" onclick="playWord('${w.word}')">🔊</button>
          <div class="dictation-hint">听音选词，写出英文</div>
        </div>
        <input class="answer-input" id="answer-input" placeholder="输入英文单词" autocomplete="off" />
        <div id="feedback" style="margin-top:8px;min-height:22px"></div>
        <button class="submit-btn" id="submit-btn" onclick="submitSpelling()">确认</button>
      </div>`;
    }

    window.playWord = function(word) {
      const utt = new SpeechSynthesisUtterance(word);
      utt.lang = 'en-US'; utt.rate = 0.8;
      speechSynthesis.speak(utt);
    };

    window.submitSpelling = function() {
      const input = document.getElementById('answer-input').value.trim().toLowerCase();
      const correct = (taskResults['spelling']._words[currentIdx] || {}).word || '';
      const ok = input === correct.toLowerCase();
      if (ok) taskResults['spelling'].score++;
      taskResults['spelling'].answers.push({ word: correct, given: input, correct: ok });

      document.getElementById('feedback').innerHTML = ok
        ? '<span class="feedback-correct">✓ 正确！</span>'
        : `<span class="feedback-wrong">✗ 正确答案：${correct}</span>`;

      document.getElementById('submit-btn').disabled = true;
      setTimeout(() => {
        currentIdx++;
        showWord(STAGES[currentStageIdx], taskResults['spelling']._words);
      }, 800);
    };

    // ─── Irregular Verbs ─────────────────────────────────────────────
    function buildIrregularItem(w, num, total, stage) {
      const parts = w.word.split('/');
      const base = parts[0] || '';
      const past = parts[1] || '';
      const pp = parts[2] || '';
      const tenses = ['past', 'past_participle'];
      const tense = tenses[Math.floor(Math.random() * tenses.length)];
      const tenseLabel = tense === 'past' ? '过去式' : '过去分词';
      const answer = tense === 'past' ? past : pp;

      taskResults['irregular'].answers.push({ base, tense, correct: answer });

      const sentences = [
        `Yesterday, I _____ to school.`,
        `Last night, she _____ a story.`,
        `He _____ fast yesterday.`,
        `We _____ to the park.`,
        `I have _____ water.`,
        `She has _____ a song.`,
        `They have _____ in the sea.`,
        `The ticket _____ me 30 yuan.`,
      ];
      const tmpl = sentences[Math.floor(Math.random() * sentences.length)];

      return `
      <div class="word-item">
        <div class="word-item-header">
          <span style="font-size:0.8rem;color:var(--sub)">${num} / ${total}</span>
          <span class="word-badge ${stage.badge}">${stage.label}</span>
        </div>
        <div style="font-size:0.85rem;color:var(--sub);margin-bottom:10px">
          原型：<b style="color:var(--primary)">${base}</b>（${tenseLabel}）
        </div>
        <div class="verb-sentence">${tmpl.replace('_____', '<span class="verb-blank">'.padEnd(answer.length + 12, '　') + '</span>')}</div>
        <input class="answer-input" id="answer-input" placeholder="填写${tenseLabel}" autocomplete="off" />
        <div id="feedback" style="margin-top:8px;min-height:22px"></div>
        <button class="submit-btn" id="submit-btn" onclick="submitIrregular()">确认</button>
      </div>`;
    }

    window.submitIrregular = function() {
      const input = document.getElementById('answer-input').value.trim().toLowerCase();
      const item = taskResults['irregular'].answers[currentIdx];
      const ok = input === item.correct.toLowerCase();
      if (ok) taskResults['irregular'].score++;

      document.getElementById('feedback').innerHTML = ok
        ? '<span class="feedback-correct">✓ 正确！</span>'
        : `<span class="feedback-wrong">✗ 正确答案：${item.correct}</span>`;

      document.getElementById('submit-btn').disabled = true;
      setTimeout(() => {
        currentIdx++;
        showWord(STAGES[currentStageIdx], taskResults['irregular']._words);
      }, 800);
    };

    // ─── PEP ─────────────────────────────────────────────────────────
    function buildPepItem(w, num, total, stage) {
      return `
      <div class="word-item">
        <div class="word-item-header">
          <span style="font-size:0.8rem;color:var(--sub)">${num} / ${total}</span>
          <span class="word-badge ${stage.badge}">${stage.label}</span>
        </div>
        <div class="dictation-center">
          <button class="play-btn" onclick="playWord('${w.word}')">🔊</button>
          <div class="dictation-hint">听单词，写出英文</div>
        </div>
        <input class="answer-input" id="answer-input" placeholder="输入英文单词" autocomplete="off" />
        <div id="feedback" style="margin-top:8px;min-height:22px"></div>
        <button class="submit-btn" id="submit-btn" onclick="submitPep()">确认</button>
      </div>`;
    }

    window.submitPep = function() {
      const input = document.getElementById('answer-input').value.trim().toLowerCase();
      const correct = (taskResults['pep']._words[currentIdx] || {}).word || '';
      const ok = input === correct.toLowerCase();
      if (ok) taskResults['pep'].score++;
      taskResults['pep'].answers.push({ word: correct, given: input, correct: ok });

      document.getElementById('feedback').innerHTML = ok
        ? '<span class="feedback-correct">✓ 正确！</span>'
        : `<span class="feedback-wrong">✗ 正确答案：${correct}</span>`;

      document.getElementById('submit-btn').disabled = true;
      setTimeout(() => {
        currentIdx++;
        showWord(STAGES[currentStageIdx], taskResults['pep']._words);
      }, 800);
    };

    // ─── Finish Stage ─────────────────────────────────────────────────
    function finishStage(stage, total) {
      const r = taskResults[stage.type];
      document.getElementById('progressFill').style.width =
        ((currentStageIdx + 1) / STAGES.length * 100) + '%';
      document.getElementById('stepIndicator').textContent =
        `${stage.label} 完成！得分 ${r.score}/${total}`;

      document.getElementById('taskSection').innerHTML = `
        <div class="done-screen">
          <div class="emoji">${r.score >= total * 0.8 ? '🎉' : '💪'}</div>
          <h2>${stage.label} 完成</h2>
          <div style="color:var(--sub);margin-top:4px">${r.score}/${total} 正确</div>
          <button class="submit-btn" onclick="startStage(${currentStageIdx + 1})">
            ${currentStageIdx < STAGES.length - 1 ? '继续下一项 →' : '查看成绩 ✓'}
          </button>
        </div>`;
    }

    // ─── Finish All ────────────────────────────────────────────────────
    function finishAll() {
      const totalScore = STAGES.reduce((sum, s) => sum + taskResults[s.type].score, 0);
      const totalCount = STAGES.reduce((sum, s) => {
        const w = allWords.filter(w => w.word_type === s.type);
        return sum + Math.min(w.length, s.count);
      }, 0);

      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('stepIndicator').textContent = '全部完成！';

      const stageRows = STAGES.map(s => {
        const r = taskResults[s.type];
        const cnt = r._words ? r._words.length : 0;
        return `<div class="score-box">
          <div class="num">${r.score}/${cnt}</div>
          <div class="label">${s.label}</div>
        </div>`;
      }).join('');

      document.getElementById('taskSection').innerHTML = `
        <div class="done-screen">
          <div class="emoji">${totalScore >= totalCount * 0.8 ? '🏆' : '💪'}</div>
          <h2>英语听写完成！</h2>
          <div style="color:var(--sub);margin-top:4px">共 ${totalCount} 题，正确 ${totalScore} 题</div>
          <div class="score-row">${stageRows}</div>
          <button class="submit-btn" onclick="saveLogAndFinish()">保存成绩 ✓</button>
        </div>`;

      window._totalScore = totalScore;
      window._totalCount = totalCount;
    }

    function saveLogAndFinish() {
      const today = new Date().toISOString().slice(0, 10);
      const payload = {
        child_id: 1,
        date: today,
        task_type: 'en_dictation',
        score: window._totalScore,
        total: window._totalCount,
        detail: JSON.stringify({
          spelling:  taskResults['spelling'].score,
          irregular: taskResults['irregular'].score,
          pep:       taskResults['pep'].score,
          answers: STAGES.reduce((acc, s) => {
            acc[s.type] = taskResults[s.type].answers;
            return acc;
          }, {})
        })
      };

      fetch(`${API}/english/daily-log`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      }).then(r => r.json()).then(data => {
        if (data.id || data.success) {
          document.getElementById('taskSection').innerHTML = `
            <div class="done-screen">
              <div class="emoji">✅</div>
              <h2>成绩已保存！</h2>
              <div style="color:var(--sub);margin-top:8px">正在返回首页...</div>
            </div>`;
          setTimeout(() => { location.href = 'index.html'; }, 1500);
        }
      }).catch(() => {
        // 即使保存失败也返回首页
        location.href = 'index.html';
      });
    }

    init();
  </script>
</body>
</html>
