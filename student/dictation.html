<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>听写练习</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .step { display: none; }
    .step.active { display: block; }
    .char-display { min-height: 52px; }

    /* 单字提示 */
    #word_hint {
      font-size: 14px;
      color: var(--sub);
      margin-top: 6px;
      min-height: 20px;
    }
  </style>
</head>
<body>

<!-- Step: 练习（今日任务直达） -->
<div id="step_practice" class="step active">
  <div class="page-header">
    <button class="back-btn" onclick="location.href='today.html'">←</button>
    <span id="progress_text">听写练习</span>
  </div>

  <div class="card" style="text-align:center">
    <div id="pinyin_show" class="pinyin-display"></div>
    <div id="char_show" class="char-display"></div>
    <div id="word_hint"></div>
  </div>

  <div class="card" style="text-align:center">
    <button onclick="playTTS()" style="background:none;border:none;cursor:pointer;font-size:32px;padding:8px" title="播放发音">🔊</button>
    <div id="gridContainer" style="display:flex;justify-content:center;align-items:center;overflow:hidden">
      <canvas id="drawCanvas" style="display:block;width:auto;height:auto;max-width:100%"></canvas>
    </div>
    <div class="toolbar">
      <button onclick="clearCanvas()" style="background:#F5F5F5;color:var(--text)">🗑️ 重写</button>
      <button onclick="playTTS()" style="background:#FFF3E0;color:#E65100;margin-left:8px">🔊 重播</button>
      <button onclick="handleMainAction()" style="background:#E8F5E9;color:var(--success);margin-left:8px" id="main_btn">下一个 →</button>
    </div>
  </div>

  <div id="finish_hint" style="display:none;text-align:center;margin-top:12px" class="card">
    <button class="btn btn-success btn-large" onclick="submitSession()">✓ 提交完成</button>
  </div>
</div>

<!-- Step: 单元选择（自由练习） -->
<div id="step_select" class="step">
  <div class="page-header">
    <button class="back-btn" onclick="location.href='today.html'">←</button>
    <span>选择练习单元</span>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span>勾选练习单元</span>
      <button onclick="toggleAll()" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:13px">全选/清空</button>
    </div>
    <div id="unit_list" class="unit-grid"></div>
    <div style="font-size:13px;color:var(--sub);margin:8px 0" id="select_info">已选 0 个单元，约 0 个字</div>
    <button class="btn btn-primary btn-large" onclick="startPractice()">开始练习</button>
  </div>
</div>

<!-- Step: 完成 -->
<div id="step_done" class="step">
  <div class="done-page">
    <div class="done-emoji">🎉</div>
    <div class="done-title">听写完成！</div>
    <div class="done-pts">本次获得 +5 积分</div>
    <button class="btn btn-primary btn-large" style="margin-top:32px;max-width:260px" onclick="location.href='today.html'">
      📅 返回任务页
    </button>
  </div>
</div>

<script>
const API      = 'http://' + location.hostname + ':8080/api';
const TTS_BASE = 'http://' + location.hostname + ':8082';

const taskId = new URLSearchParams(location.search).get('task_id');

let units = [];
let selectedUnits = new Set();
let sessionId = null;
let sessionKey = null;
let words = [];
let currentIdx = 0;
let uploaded = [];
let isSaving = false;
let taskUnitName = ''; // 当前任务的课文名，用于单字提示

// ── 初始化 ─────────────────────────────────────────────────

async function init() {
  if (taskId) {
    const res = await fetch(API + '/daily-tasks/today?child_id=1');
    const data = await res.json();
    const task = data.tasks.find(t => t.id == taskId && t.task_type === 'dictation');
    if (task && task.words) {
      words = task.words;
      sessionKey = 'task_' + taskId + '_' + Date.now();
      uploaded = new Array(words.length).fill(false);
      currentIdx = 0;
      taskUnitName = task.unit_name || '';
      showStep('practice');
      showWord(0);
    } else {
      alert('任务数据异常');
      location.href = 'today.html';
    }
  } else {
    showStep('select');
    loadUnits();
  }
}

// ── 今日任务练习 ───────────────────────────────────────────

function isLastWord() {
  return currentIdx === words.length - 1;
}

function showWord(idx) {
  console.log('[showWord] idx=' + idx, 'total=' + words.length);
  currentIdx = idx;
  const w = words[idx];
  const last = isLastWord();

  document.getElementById('progress_text').textContent = '第 ' + (idx+1) + ' / ' + words.length + ' 字';
  document.getElementById('char_show').textContent = '';
  document.getElementById('pinyin_show').textContent = '';
  document.getElementById('finish_hint').style.display = 'none';

  console.log('[showWord] calling clearCanvas');
  clearCanvas();

  // 最后一个字 → 按钮变成"提交"
  const btn = document.getElementById('main_btn');
  if (last) {
    btn.textContent = '✓ 提交';
    btn.style.background = '#004BFE';
    btn.style.color = '#fff';
  } else {
    btn.textContent = '下一个 →';
    btn.style.background = '#E8F5E9';
    btn.style.color = 'var(--success)';
  }

  // 单字提示：显示「XX」的Y
  const charText = w.char || '';
  const wordText = w.word || '';
  const isSingle = charText.length === 1 && wordText && wordText !== charText;
  const hintEl = document.getElementById('word_hint');
  if (isSingle) {
    // TTS 播「XX」的Y，提示也显示「XX」的Y
    hintEl.textContent = '「' + wordText + '」的' + charText;
    hintEl.style.color = '#888';
    hintEl.style.fontSize = '14px';
  } else {
    hintEl.textContent = '';
  }

  // TTS：单字播「XX」的Y，多字播字
  const ttsText = isSingle ? ('「' + wordText + '」的' + charText) : (charText || wordText || '');
  playTTS(ttsText);
}

// ── 按钮动作（下一个 / 提交） ───────────────────────────────

async function handleMainAction() {
  const btn = document.getElementById('main_btn');
  if (btn.disabled) return; // 防重复点击，3秒内只能点一次
  btn.disabled = true;
  setTimeout(() => { btn.disabled = false; }, 3000);

  if (isSaving) return;
  isSaving = true;
  await saveImage();
  isSaving = false;

  if (isLastWord()) {
    await submitSession();
  } else {
    currentIdx++;
    showWord(currentIdx);
  }
}

// ── 自由练习：单元选择 ──────────────────────────────────────

async function loadUnits() {
  const data = await fetch(API + '/words/units').then(r=>r.json());
  units = data;
  const grid = document.getElementById('unit_list');
  grid.innerHTML = '';
  units.forEach(u => {
    const div = document.createElement('div');
    div.className = 'unit-chip';
    div.dataset.id = u.unit_id;
    div.textContent = u.unit_name;
    div.onclick = () => toggleUnit(u.unit_id, div);
    grid.appendChild(div);
  });
  const allWords = await fetch(API + '/words').then(r=>r.json());
  words = allWords;
  updateSelectInfo();
}

function toggleUnit(id, el) {
  if (selectedUnits.has(id)) {
    selectedUnits.delete(id);
    el.classList.remove('selected');
  } else {
    selectedUnits.add(id);
    el.classList.add('selected');
  }
  updateSelectInfo();
}

function toggleAll() {
  if (selectedUnits.size === units.length) {
    selectedUnits.clear();
    document.querySelectorAll('.unit-chip').forEach(e=>e.classList.remove('selected'));
  } else {
    units.forEach(u => selectedUnits.add(u.unit_id));
    document.querySelectorAll('.unit-chip').forEach(e=>e.classList.add('selected'));
  }
  updateSelectInfo();
}

function updateSelectInfo() {
  let charCount = 0;
  if (selectedUnits.size > 0) {
    const selected = words.filter(w=>selectedUnits.has(w.unit_id));
    charCount = selected.length;
  }
  document.getElementById('select_info').textContent =
    '已选 ' + selectedUnits.size + ' 个单元，约 ' + charCount + ' 个字';
}

async function startPractice() {
  if (selectedUnits.size === 0) { alert('请至少选择一个单元'); return; }
  const selected = words.filter(w=>selectedUnits.has(w.unit_id));
  if (selected.length === 0) { alert('所选单元没有字'); return; }
  words = selected;
  uploaded = new Array(words.length).fill(false);
  sessionKey = 'free_' + Date.now();
  currentIdx = 0;
  showStep('practice');
  showWord(0);
}

// ── 公共 ───────────────────────────────────────────────────

function showStep(name) {
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step_' + name).classList.add('active');
}

async function playTTS(text) {
  if (!text) return;
  console.log('[playTTS] playing:', text);
  try {
    const audio = new Audio(TTS_BASE + '/tts?text=' + encodeURIComponent(text));
    audio.onended = () => console.log('[playTTS] ended:', text);
    audio.onerror = () => console.error('[playTTS] error:', text);
    await audio.play();
  } catch(e) { console.error(e); }
}

// ── 米字格 ─────────────────────────────────────────────────

function getWordLen() {
  const text = (words[currentIdx]?.char || words[currentIdx]?.word || '').length;
  return text || 1;
}

function drawGrid() {
  const canvas = document.getElementById('drawCanvas');
  const ctx   = canvas.getContext('2d');
  const n     = getWordLen();
  const gap   = 6;
  const containerW = canvas.parentElement.clientWidth || 300;
  const size = Math.floor((containerW - gap * (n - 1)) / n);
  const safeSize = Math.max(size, 60);
  const totalW = n * safeSize + gap * (n - 1);
  canvas.width  = totalW;
  canvas.height = safeSize;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, totalW, safeSize);
  for (let i = 0; i < n; i++) {
    const x = i * (safeSize + gap);
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
    ctx.strokeRect(x, 0, safeSize, safeSize);
    ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 0.8; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(x, safeSize / 2); ctx.lineTo(x + safeSize, safeSize / 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + safeSize / 2, 0); ctx.lineTo(x + safeSize / 2, safeSize); ctx.stroke();
    ctx.strokeStyle = '#3498db'; ctx.lineWidth = 0.6; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + safeSize, safeSize); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + safeSize, 0); ctx.lineTo(x, safeSize); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function clearCanvas() {
  console.log('[clearCanvas] called from:', new Error().stack.split('\n')[2]);
  drawGrid();
  const ctx = document.getElementById('drawCanvas').getContext('2d');
  ctx.strokeStyle = '#1A1A2E';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

// ── Canvas ─────────────────────────────────────────────────

const canvas = document.getElementById('drawCanvas');
let drawing = false, lastX=0, lastY=0;

function getCtx() { return canvas.getContext('2d'); }

function offset(e) {
  const r = canvas.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}
function touchOffset(t) {
  const r = canvas.getBoundingClientRect();
  return [t.clientX - r.left, t.clientY - r.top];
}
function draw(e) {
  const [x,y] = offset(e);
  const ctx = getCtx();
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
  lastX=x; lastY=y;
}

canvas.addEventListener('mousedown', e => { drawing=true; [lastX,lastY]=offset(e); });
canvas.addEventListener('mousemove', e => { if(!drawing)return; draw(e); });
canvas.addEventListener('mouseup',   ()=>{ drawing=false; });
canvas.addEventListener('mouseleave',()=>{ drawing=false; });
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); drawing=true; const t=e.touches[0]; [lastX,lastY]=touchOffset(t); },{passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); if(!drawing)return; draw(e.touches[0]); },{passive:false});
canvas.addEventListener('touchend',  ()=>{ drawing=false; });

async function saveImage() {
  const canvas2 = document.getElementById('drawCanvas');
  const dataURL = canvas2.toDataURL('image/png');
  const filename = sessionKey + '_' + currentIdx + '.png';
  const blob = await (await fetch(dataURL)).blob();
  const form = new FormData();
  form.append('file', blob, filename);
  try {
    const up = await fetch(API + '/upload', { method:'POST', body:form });
    const ret = await up.json();
    console.log('[saveImage] upload ret:', ret);
    const imgPath = ret.url || '';
    if (imgPath && sessionId) {
      const putRes = await fetch(API + '/sessions/' + sessionId, {
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ image_url: imgPath, char: words[currentIdx].char })
      });
      const putData = await putRes.json();
      console.log('[saveImage] put ret:', putData);
      if (!putData.ok) {
        console.error('[saveImage] failed to update image_url for char', words[currentIdx].char);
      } else {
        uploaded[currentIdx] = true;
      }
    } else {
      console.warn('[saveImage] imgPath or sessionId missing, skipping update');
    }
  } catch(e) { console.error('[saveImage] error:', e); }
}

async function submitSession() {
  if (!sessionId) {
    // 自由练习，创建 session
    const res = await fetch(API + '/sessions', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ mode: 'dictation', unit_ids: [...selectedUnits], child_id: 1, words: words })
    }).then(r=>r.json());
    sessionId = res.session_id;
  }
  const missing = uploaded.some(u => !u);
  if (missing) { alert('还有字没写完，请确保每个字都写过'); return; }
  try {
    if (sessionId) {
      await fetch(API + '/sessions/' + sessionId + '/submit', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ char_count: words.length })
      });
    }
    if (taskId) {
      await fetch(API + '/daily-tasks/' + taskId + '/complete', { method:'POST' });
    }
    showStep('done');
  } catch(e) { alert('提交失败: ' + e); }
}

document.addEventListener('contextmenu', e=>e.preventDefault());
// 去掉 resize 监听，避免滚动页面时触发 clearCanvas 清掉字迹
// window.addEventListener('resize', () => { if (words.length > 0) clearCanvas(); });

init();
</script>
</body>
</html>
