<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>英文听写</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); }
    .back-btn { color: #fff; text-decoration: none; font-size: 15px; padding: 4px 8px; border-radius: 8px; background: rgba(255,255,255,20%); }
    .page-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #4F46E5; color: #fff; }
    .pool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
    .pool-card {
      background: #fff; border-radius: 16px; padding: 16px;
      text-align: center; cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .pool-card.selected { border-color: #4F46E5; background: #EEF2FF; }
    .pool-card .icon { font-size: 32px; }
    .pool-card .name { font-weight: 700; font-size: 14px; margin-top: 6px; }
    .pool-card .count { font-size: 12px; color: var(--sub); margin-top: 4px; }
    .start-btn {
      display: block; width: calc(100% - 32px); margin: 0 16px 16px;
      padding: 14px; background: #4F46E5; color: #fff;
      border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer;
    }
    .start-btn:disabled { background: #ccc; }
    /* Quiz mode */
    .quiz-container { padding: 16px; display: none; }
    .quiz-progress { font-size: 13px; color: var(--sub); text-align: center; margin-bottom: 20px; }
    .word-card {
      background: #fff; border-radius: 20px; padding: 32px 24px;
      text-align: center; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .play-btn {
      width: 72px; height: 72px; border-radius: 50%; background: #4F46E5;
      border: none; color: #fff; font-size: 28px; cursor: pointer;
      margin-bottom: 20px; display: inline-flex; align-items: center; justify-content: center;
    }
    .play-btn:active { transform: scale(0.95); }
    .hint-text { font-size: 13px; color: var(--sub); margin-bottom: 16px; }
    .answer-input {
      width: 100%; padding: 14px; border: 2px solid #E5E7EB;
      border-radius: 12px; font-size: 18px; text-align: center;
      box-sizing: border-box; outline: none;
    }
    .answer-input:focus { border-color: #4F46E5; }
    .answer-input.correct { border-color: #22C55E; background: #F0FDF4; }
    .answer-input.wrong { border-color: #EF4444; background: #FEF2F2; }
    .feedback { font-size: 15px; font-weight: 700; margin-top: 12px; min-height: 24px; }
    .feedback.ok { color: #22C55E; }
    .feedback.bad { color: #EF4444; }
    .next-btn {
      display: block; width: 100%; margin-top: 16px; padding: 14px;
      background: #4F46E5; color: #fff; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    /* Result */
    .result-container { padding: 24px 16px; text-align: center; display: none; }
    .result-icon { font-size: 72px; margin-bottom: 16px; }
    .result-score { font-size: 48px; font-weight: 800; color: #4F46E5; margin-bottom: 8px; }
    .result-detail { font-size: 15px; color: var(--sub); margin-bottom: 24px; }
    .result-actions { display: flex; gap: 12px; }
    .result-actions button {
      flex: 1; padding: 14px; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .result-back { background: #F3F4F6; color: var(--text); }
    .result-retry { background: #4F46E5; color: #fff; }
    /* Nav bar */
    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid var(--border);
      display: flex; padding: 8px 0; padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .nav-item {
      flex: 1; text-align: center; font-size: 11px; color: var(--sub);
      text-decoration: none; padding: 4px 0;
    }
    .nav-item.active { color: #4F46E5; }
    .nav-item .nav-icon { font-size: 22px; display: block; }
    body { padding-bottom: 72px; }
  </style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">← 返回</a>
  <span style="font-weight:700">英文听写</span>
</div>

<!-- Pool selection -->
<div id="pool-view">
  <div style="padding:12px 16px 0;font-size:14px;color:var(--sub)">选择词库</div>
  <div class="pool-grid" id="pool-grid"></div>
  <button class="start-btn" id="btn-start" onclick="startQuiz()">开始听写</button>
</div>

<!-- Quiz mode -->
<div id="quiz-view" class="quiz-container">
  <div class="quiz-progress" id="quiz-progress"></div>
  <div class="word-card">
    <button class="play-btn" id="btn-play" onclick="playWord()">🔊</button>
    <div class="hint-text">听发音，写出英文单词</div>
    <input class="answer-input" id="answer-input" autocomplete="off" autocorrect="off"
           spellcheck="false" placeholder="输入英语单词" onkeydown="if(event.key==='Enter')checkAnswer()">
    <div class="feedback" id="feedback"></div>
  </div>
  <button class="next-btn" id="btn-next" onclick="nextWord()">下一题</button>
</div>

<!-- Result -->
<div id="result-view" class="result-container">
  <div class="result-icon" id="result-icon">🏆</div>
  <div class="result-score" id="result-score"></div>
  <div class="result-detail" id="result-detail"></div>
  <div class="result-actions">
    <button class="result-back" onclick="location.href='index.html'">返回首页</button>
    <button class="result-retry" onclick="restartQuiz()">再来一次</button>
  </div>
</div>

<nav class="nav-bar">
  <a href="index.html" class="nav-item active">
    <span class="nav-icon">🏠</span>首页
  </a>
  <a href="today.html" class="nav-item">
    <span class="nav-icon">📅</span>今日
  </a>
  <a href="profile.html" class="nav-item">
    <span class="nav-icon">👤</span>我的
  </a>
</nav>

<script>
const API = 'http://' + location.hostname + ':8080/api';

let allWords = [];
let selectedPools = new Set();
let quizWords = [];
let currentIdx = 0;
let correctCount = 0;
let wrongIds = new Set();
let poolInfo = {};

async function loadPools() {
  // 加载所有词库
  const [spelling, irregular, pep] = await Promise.all([
    fetch(API + '/english/words?week_date=2026-05-11&word_type=spelling').then(r => r.json()),
    fetch(API + '/english/words?week_date=2026-05-11&word_type=irregular').then(r => r.json()),
    fetch(API + '/english/words?week_date=2026-05-11&word_type=pep').then(r => r.json()),
  ]);

  poolInfo = {
    spelling: { name: 'Spelling L30+L31', icon: '📚', words: spelling.words || [] },
    irregular: { name: 'Irregular Verbs', icon: '🔄', words: irregular.words || [] },
    pep: { name: 'PEP 词汇', icon: '📖', words: pep.words || [] },
  };

  const grid = document.getElementById('pool-grid');
  grid.innerHTML = Object.entries(poolInfo).map(([key, val]) => `
    <div class="pool-card" id="pool-${key}" onclick="togglePool('${key}')">
      <div class="icon">${val.icon}</div>
      <div class="name">${val.name}</div>
      <div class="count">${val.words.length} 词</div>
    </div>
  `).join('');
}

function togglePool(key) {
  const card = document.getElementById('pool-' + key);
  if (selectedPools.has(key)) {
    selectedPools.delete(key);
    card.classList.remove('selected');
  } else {
    selectedPools.add(key);
    card.classList.add('selected');
  }
  document.getElementById('btn-start').disabled = selectedPools.size === 0;
}

function startQuiz() {
  if (selectedPools.size === 0) return;
  quizWords = [];
  for (const pool of selectedPools) {
    quizWords.push(...poolInfo[pool].words.map(w => ({...w, pool})));
  }
  // 打乱顺序
  quizWords.sort(() => Math.random() - 0.5);
  currentIdx = 0;
  correctCount = 0;
  wrongIds.clear();

  document.getElementById('pool-view').style.display = 'none';
  document.getElementById('quiz-view').style.display = 'block';
  document.getElementById('result-view').style.display = 'none';

  showWord();
}

function showWord() {
  const word = quizWords[currentIdx];
  document.getElementById('quiz-progress').textContent = `${currentIdx + 1} / ${quizWords.length}`;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').className = 'answer-input';
  document.getElementById('feedback').textContent = '';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('answer-input').focus();

  // 自动播放
  setTimeout(() => playWord(word.word), 300);
}

function playWord(word) {
  const w = word || quizWords[currentIdx].word;
  const audio = new Audio(API + '/english/tts?text=' + encodeURIComponent(w));
  audio.play().catch(() => {});
}

function checkAnswer() {
  const input = document.getElementById('answer-input');
  const userAns = input.value.trim().toLowerCase();
  const correct = quizWords[currentIdx].word.toLowerCase();
  const isCorrect = userAns === correct;

  if (isCorrect) {
    input.className = 'answer-input correct';
    document.getElementById('feedback').textContent = '✅ 正确！';
    document.getElementById('feedback').className = 'feedback ok';
    correctCount++;
  } else {
    input.className = 'answer-input wrong';
    document.getElementById('feedback').innerHTML =
      '❌ 正确答案：<b>' + quizWords[currentIdx].word + '</b>';
    document.getElementById('feedback').className = 'feedback bad';
    wrongIds.add(quizWords[currentIdx].id);
    // 记录到错题本
    const w = quizWords[currentIdx];
    fetch(API + '/english/wrongbook', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        word_id: w.id, word: w.word, pronunciation: w.pronunciation || '',
        meaning: w.meaning || '', word_type: w.word_type || '', lesson: w.lesson || ''
      })
    });
  }

  document.getElementById('btn-next').style.display = 'block';
  document.getElementById('btn-next').textContent =
    currentIdx < quizWords.length - 1 ? '下一题 →' : '查看结果';
}

function nextWord() {
  currentIdx++;
  if (currentIdx < quizWords.length) {
    showWord();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';

  const pct = Math.round(correctCount / quizWords.length * 100);
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-detail').textContent =
    `答对 ${correctCount} / ${quizWords.length} 题`;
  document.getElementById('result-icon').textContent = pct >= 90 ? '🏆' : pct >= 70 ? '👍' : '💪';
}

function restartQuiz() {
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('pool-view').style.display = 'block';
  document.getElementById('quiz-view').style.display = 'none';
  selectedPools.clear();
  document.querySelectorAll('.pool-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('btn-start').disabled = true;
}

loadPools();
</script>
</body>
</html>
